<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KIEZKINGS 3D — Urban Survival</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-orange:#ff6b2b;--neon-blue:#00d4ff;--neon-pink:#ff1493;
  --neon-green:#39ff14;--dark:#0a0a1a;--panel:rgba(10,10,30,0.82);
  --glass:rgba(255,255,255,0.06);--border:rgba(255,107,43,0.25);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',system-ui,sans-serif;color:#fff;
  touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}

/* ── Title Screen ── */
#title{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--dark);transition:opacity .8s}
#title.hidden{opacity:0;pointer-events:none}
#title h1{font-size:clamp(2.4rem,8vw,4.5rem);font-weight:900;letter-spacing:.12em;
  text-transform:uppercase;background:linear-gradient(135deg,var(--neon-orange),var(--neon-blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(255,107,43,.3);animation:pulse 2s ease-in-out infinite}
#title h2{font-size:clamp(.9rem,3vw,1.3rem);letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-top:.5rem}
#title .tap{margin-top:3rem;font-size:1rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--neon-orange);animation:blink 1.5s ease-in-out infinite}
#title .ver{position:absolute;bottom:1.2rem;font-size:.65rem;color:rgba(255,255,255,.2)}
@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Game UI ── */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ui.active{display:block}
#ui *{pointer-events:auto}

/* Top Bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;
  padding:env(safe-area-inset-top,.8rem) 1rem .5rem;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.day-label{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.day-num{color:var(--neon-orange);font-weight:700;font-size:.95rem}

/* Stats Panel */
.stats{position:absolute;top:3.5rem;left:.7rem;display:flex;flex-direction:column;gap:.45rem}
.stat{display:flex;align-items:center;gap:.4rem}
.stat-icon{font-size:.85rem;width:1.3rem;text-align:center}
.stat-bar{width:clamp(70px,22vw,110px);height:8px;background:rgba(255,255,255,.08);
  border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.stat-fill{height:100%;border-radius:3px;transition:width .5s ease}
.stat-fill.health{background:linear-gradient(90deg,#ff3333,#ff6666)}
.stat-fill.hunger{background:linear-gradient(90deg,#ff8c00,#ffb347)}
.stat-fill.money{background:linear-gradient(90deg,#22c55e,#4ade80)}
.stat-fill.respect{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.stat-val{font-size:.6rem;color:rgba(255,255,255,.55);min-width:2.4rem;text-align:right}

/* Action Panel */
#actions{position:absolute;bottom:0;left:0;right:0;
  padding:.6rem .8rem calc(env(safe-area-inset-bottom,.6rem) + .6rem);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
  transform:translateY(100%);transition:transform .35s ease;pointer-events:none}
#actions.show{transform:translateY(0);pointer-events:auto}
.action-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(255,255,255,.45)}
.action-btns{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
.action-btn{padding:.55rem 1.1rem;border:1px solid var(--border);border-radius:8px;
  background:var(--panel);color:#fff;font-size:.78rem;font-weight:600;
  letter-spacing:.05em;backdrop-filter:blur(10px);cursor:pointer;
  transition:all .2s;text-transform:uppercase}
.action-btn:active{background:var(--neon-orange);color:#000;transform:scale(.95)}

/* Toast Notifications */
#toasts{position:absolute;top:5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.4rem;width:85%;max-width:320px}
.toast{padding:.45rem .9rem;border-radius:6px;font-size:.75rem;font-weight:600;
  text-align:center;animation:toastIn .3s ease,toastOut .4s ease 2.2s forwards;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);white-space:nowrap}
.toast.good{background:rgba(34,197,94,.25);color:#4ade80;border-color:rgba(34,197,94,.2)}
.toast.bad{background:rgba(255,51,51,.25);color:#ff6666;border-color:rgba(255,51,51,.2)}
.toast.info{background:rgba(0,212,255,.2);color:var(--neon-blue);border-color:rgba(0,212,255,.15)}
.toast.money{background:rgba(255,107,43,.25);color:var(--neon-orange);border-color:rgba(255,107,43,.2)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}

/* Interaction Prompt */
#prompt{position:absolute;bottom:6rem;left:50%;transform:translateX(-50%);
  padding:.4rem .9rem;border-radius:20px;background:var(--panel);
  border:1px solid var(--border);font-size:.7rem;letter-spacing:.1em;
  text-transform:uppercase;backdrop-filter:blur(8px);
  opacity:0;transition:opacity .3s;pointer-events:none}
#prompt.show{opacity:1}

/* Game Over */
#gameover{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(0,0,0,.92)}
#gameover.show{display:flex}
#gameover h1{font-size:2.5rem;font-weight:900;color:#ff3333;letter-spacing:.1em;margin-bottom:.5rem}
#gameover .survived{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:2rem}
#gameover .retry{padding:.7rem 2rem;border:2px solid var(--neon-orange);border-radius:8px;
  background:transparent;color:var(--neon-orange);font-size:1rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
#gameover .retry:active{background:var(--neon-orange);color:#000}

/* Späti Shop UI */
#shop{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85)}
#shop.show{display:flex}
.shop-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem;width:85%;max-width:320px;backdrop-filter:blur(15px)}
.shop-title{font-size:1.1rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--neon-green);margin-bottom:.8rem;text-align:center}
.shop-item{display:flex;justify-content:space-between;align-items:center;
  padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.shop-item:last-child{border-bottom:none}
.shop-item-name{font-size:.8rem;font-weight:600}
.shop-item-desc{font-size:.6rem;color:rgba(255,255,255,.4)}
.shop-item-price{font-size:.85rem;font-weight:700;color:var(--neon-green);cursor:pointer;
  padding:.3rem .7rem;border:1px solid rgba(57,255,20,.2);border-radius:6px;transition:all .2s}
.shop-item-price:active{background:var(--neon-green);color:#000}
.shop-close{width:100%;padding:.5rem;margin-top:.8rem;border:1px solid rgba(255,255,255,.15);
  border-radius:8px;background:transparent;color:rgba(255,255,255,.6);
  font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer}
.shop-sell{width:100%;padding:.45rem;margin-top:.4rem;border:1px solid rgba(255,107,43,.3);
  border-radius:8px;background:transparent;color:var(--neon-orange);
  font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer}

/* Loading */
.loading{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
  background:var(--dark);font-size:.8rem;letter-spacing:.2em;color:rgba(255,255,255,.4)}
</style>
</head>
<body>

<div class="loading" id="loading">LOADING...</div>

<div id="title">
  <h1>KIEZKINGS</h1>
  <h2>Urban Survival</h2>
  <div class="tap">Tap to Start</div>
  <div class="ver">v3.0 — Three.js WebGL</div>
</div>

<div id="ui">
  <div class="top-bar">
    <div><span class="day-label">Tag </span><span class="day-num" id="dayNum">1</span></div>

    <div class="stat"><span class="stat-icon">🍔</span><div class="stat-bar"><div class="stat-fill hunger" id="barHunger" style="width:50%"></div></div><span class="stat-val" id="valHunger">50</span></div>

    <div class="shop-item"><div><div class="shop-item-name">🚬 Kippen</div><div class="shop-item-desc">Respekt +5</div></div><div class="shop-item-price" data-item="cigs">6.00€</div></div>
    <div class="shop-item"><div><div class="shop-item-name">💊 Aspirin</div><div class="shop-item-desc">HP +25</div></div><div class="shop-item-price" data-item="aspirin">4.00€</div></div>
    <button class="shop-sell" id="sellBottles">🍾 Flaschen verkaufen (<span id="bottleCount">0</span> × 0.25€)</button>
    <button class="shop-close" id="shopClose">✕ Schließen</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const C = {
  bg: 0x080816, ground: 0x181820, road: 0x101016, sidewalk: 0x222230,
  building: [0x2a2a3a, 0x333345, 0x252535, 0x3a3a4a, 0x28283d],
  concrete: 0x4a4a55, neonOrange: 0xff6b2b, neonBlue: 0x00d4ff,
  neonPink: 0xff1493, neonGreen: 0x39ff14, warmLight: 0xffd070,
  skin: 0xe0b090, metal: 0x606068, wood: 0x6b5020, grass: 0x1a3a12,
  window: 0x1a2030, windowLit: 0xffcc44, red: 0xff3333, playerBody: 0x4477aa,
  playerPants: 0x333344, npcColors: [0x995533, 0x559944, 0xaa4444, 0x886644, 0x5555aa],
  punk: 0xcc3366, polizei: 0x334488,
};

const WORLD_SIZE = 80;
const INTERACT_DIST = 3.5;
const MOVE_SPEED = 5;
const NPC_SPEED = 1.8;

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
class GameState {
  constructor() { this.reset(); }
  reset() {
    this.health = 70; this.hunger = 50; this.money = 0.50; this.respect = 0;
    this.bottles = 0; this.day = 1; this.gameTime = 360; // 6:00 in minutes
    this.alive = true; this.totalTime = 0;
    this.searchCooldowns = new Map();
  }
  clamp() {
    this.health = Math.max(0, Math.min(100, this.health));
    this.hunger = Math.max(0, Math.min(100, this.hunger));
    this.money = Math.max(0, this.money);
    this.respect = Math.max(0, Math.min(100, this.respect));
    if (this.health <= 0) this.alive = false;
  }
}

// ═══════════════════════════════════════════
// MATERIALS (reuse for perf)
// ═══════════════════════════════════════════
function mat(color, opts = {}) {
  return new THREE.MeshLambertMaterial({ color, flatShading: true, ...opts });
}
function matEmit(color, intensity = 0.6) {
  return new THREE.MeshBasicMaterial({ color });
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function box(w, h, d) { return new THREE.BoxGeometry(w, h, d); }
function cyl(rt, rb, h, seg = 8) { return new THREE.CylinderGeometry(rt, rb, h, seg); }
function sphere(r, w = 8, h = 6) { return new THREE.SphereGeometry(r, w, h); }

function group(...children) {
  const g = new THREE.Group();
  children.forEach(c => g.add(c));
  return g;
}

function mesh(geom, material, x = 0, y = 0, z = 0) {
  const m = new THREE.Mesh(geom, material);
  m.position.set(x, y, z);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

function rng(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ═══════════════════════════════════════════
// WORLD BUILDER
// ═══════════════════════════════════════════
class WorldBuilder {
  constructor(scene) {
    this.scene = scene;
    this.interactables = [];
    this.colliders = [];
    this.npcs = [];
  }

  build() {
    this.createGround();
    this.createRoads();
    this.createBahnhof();
    this.createSpati();
    this.createBuildings();
    this.createStreetFurniture();
    this.createBottles();
    this.createTrees();
    this.createDetails();
    this.createLighting();
    this.createNPCs();
  }

  createGround() {
    const ground = mesh(new THREE.PlaneGeometry(WORLD_SIZE * 2, WORLD_SIZE * 2), mat(C.ground), 0, -0.01, 0);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.castShadow = false;
    ground.name = 'ground';
    this.scene.add(ground);

    // Sidewalk areas
    const sw = mat(C.sidewalk);
    [[-15, 0, 30, 50], [15, 0, 30, 50], [0, -15, 50, 30], [0, 15, 50, 30]].forEach(([x, z, w, d]) => {
      const s = mesh(new THREE.PlaneGeometry(w, d), sw, x, 0.01, z);
      s.rotation.x = -Math.PI / 2;
      s.receiveShadow = true; s.castShadow = false;
      this.scene.add(s);
    });
  }

  createRoads() {
    const roadMat = mat(C.road);
    const stripeMat = matEmit(0x555555);
    // Main roads (cross pattern)
    [{ x: 0, z: 0, w: 8, d: WORLD_SIZE * 2, r: 0 },
     { x: 0, z: 0, w: WORLD_SIZE * 2, d: 8, r: 0 }].forEach(({ x, z, w, d }) => {
      const r = mesh(new THREE.PlaneGeometry(w, d), roadMat, x, 0.02, z);
      r.rotation.x = -Math.PI / 2; r.receiveShadow = true; r.castShadow = false;
      this.scene.add(r);
    });
    // Road stripes
    for (let i = -WORLD_SIZE; i < WORLD_SIZE; i += 4) {
      const s1 = mesh(new THREE.PlaneGeometry(0.15, 2), stripeMat, 0, 0.03, i);
      s1.rotation.x = -Math.PI / 2; this.scene.add(s1);
      const s2 = mesh(new THREE.PlaneGeometry(2, 0.15), stripeMat, i, 0.03, 0);
      s2.rotation.x = -Math.PI / 2; this.scene.add(s2);
    }
  }

  createBahnhof() {
    const g = new THREE.Group();
    g.position.set(20, 0, -20);

    // Main building
    const main = mesh(box(18, 8, 12), mat(C.building[0]), 0, 4, 0);
    g.add(main);
    this.colliders.push({ x: 20, z: -20, w: 18, d: 12 });

    // Roof
    const roof = mesh(box(20, 0.5, 14), mat(0x1a1a2a), 0, 8.25, 0);
    g.add(roof);

    // Entrance columns
    for (let i = -3; i <= 3; i += 2) {
      g.add(mesh(cyl(0.3, 0.3, 7, 6), mat(C.concrete), i * 1.5, 3.5, 6.3));
    }

    // Entrance canopy
    g.add(mesh(box(12, 0.3, 4), mat(0x222233), 0, 7.2, 7.5));

    // BAHNHOF sign (glowing)
    const signGeo = box(8, 1.2, 0.3);
    const sign = mesh(signGeo, matEmit(C.neonBlue), 0, 7, 8);
    g.add(sign);

    // Glow light for sign
    const signLight = new THREE.PointLight(C.neonBlue, 2, 15);
    signLight.position.set(0, 7, 9);
    g.add(signLight);

    // Windows
    const winMat = mat(C.windowLit, { emissive: C.windowLit, emissiveIntensity: 0.3 });
    for (let r = 0; r < 2; r++) {
      for (let c = -3; c <= 3; c++) {
        if (Math.abs(c) < 2 && r === 0) continue; // skip entrance
        const w = mesh(box(1.2, 1.5, 0.1), winMat, c * 2, 3 + r * 3.5, 6.05);
        g.add(w);
      }
    }

    // Platform area
    const platform = mesh(box(22, 0.3, 5), mat(0x333340), 0, 0.15, -9);
    g.add(platform);

    // Rails
    for (let i = 0; i < 3; i++) {
      const rail = mesh(box(22, 0.08, 0.08), mat(C.metal), 0, 0.05, -12 - i * 1.5);
      g.add(rail);
    }

    // Clock
    const clock = mesh(cyl(0.6, 0.6, 0.15, 16), matEmit(0xffffff), 0, 8.5, 6.1);
    clock.rotation.x = Math.PI / 2;
    g.add(clock);

    this.scene.add(g);
  }

  createSpati() {
    const g = new THREE.Group();
    g.position.set(-18, 0, 12);

    // Building
    g.add(mesh(box(7, 4.5, 5), mat(C.building[1]), 0, 2.25, 0));
    this.colliders.push({ x: -18, z: 12, w: 7, d: 5 });

    // Awning
    const awning = mesh(box(8, 0.15, 2.5), mat(0x884422), 0, 4.2, 3);
    g.add(awning);

    // SPÄTI neon sign
    const sign = mesh(box(5, 0.8, 0.15), matEmit(C.neonGreen), 0, 5, 2.6);
    g.add(sign);
    const sl = new THREE.PointLight(C.neonGreen, 3, 12);
    sl.position.set(0, 5, 4); g.add(sl);

    // Door
    g.add(mesh(box(1.5, 2.8, 0.15), mat(0x334455), 0, 1.4, 2.55));

    // Windows with products inside
    g.add(mesh(box(1.8, 1.5, 0.1), mat(C.windowLit, { emissive: C.windowLit, emissiveIntensity: 0.4 }), -2, 2.5, 2.55));
    g.add(mesh(box(1.8, 1.5, 0.1), mat(C.windowLit, { emissive: C.windowLit, emissiveIntensity: 0.4 }), 2, 2.5, 2.55));

    // Interaction zone
    const zone = mesh(box(3, 0.05, 3), new THREE.MeshBasicMaterial({ color: C.neonGreen, transparent: true, opacity: 0 }), 0, 0.05, 4.5);
    zone.userData = { interactive: true, type: 'spati', label: '🏪 Späti betreten' };
    g.add(zone);
    this.interactables.push(zone);

    // Beer crates outside
    for (let i = 0; i < 3; i++) {
      g.add(mesh(box(0.8, 0.5, 0.6), mat(0x554400), 3.8, 0.25, 1 + i));
    }

    this.scene.add(g);
  }

  createBuildings() {
    const positions = [
      { x: -22, z: -18, w: 8, h: 12, d: 7 },
      { x: -22, z: -8, w: 6, h: 9, d: 6 },
      { x: 22, z: 8, w: 7, h: 14, d: 8 },
      { x: 22, z: 18, w: 9, h: 10, d: 6 },
      { x: -12, z: -25, w: 8, h: 7, d: 7 },
      { x: 12, z: 25, w: 10, h: 11, d: 7 },
      { x: -25, z: 25, w: 7, h: 8, d: 6 },
      { x: 28, z: -10, w: 6, h: 16, d: 6 },
      { x: -30, z: 0, w: 8, h: 6, d: 10 },
      { x: 30, z: -25, w: 7, h: 9, d: 7 },
      { x: -10, z: 28, w: 6, h: 7, d: 5 },
      { x: 10, z: -28, w: 8, h: 13, d: 6 },
    ];

    positions.forEach(p => {
      const g = new THREE.Group();
      const color = pick(C.building);
      g.add(mesh(box(p.w, p.h, p.d), mat(color), 0, p.h / 2, 0));
      this.colliders.push({ x: p.x, z: p.z, w: p.w, d: p.d });

      // Windows
      const winRows = Math.floor(p.h / 3);
      const winCols = Math.floor(p.w / 2.5);
      const lit = mat(C.windowLit, { emissive: C.windowLit, emissiveIntensity: 0.25 });
      const dark = mat(C.window);
      for (let r = 0; r < winRows; r++) {
        for (let c = 0; c < winCols; c++) {
          const wx = (c - (winCols - 1) / 2) * 2;

// PLAYER CHARACTER
// ═══════════════════════════════════════════
class Player {
  constructor(scene) {
    this.scene = scene;
    this.group = new THREE.Group();
    this.targetPos = null;
    this.moving = false;
    this.walkCycle = 0;
    this.build();
    this.group.position.set(0, 0, 5);
    scene.add(this.group);
  }

  build() {
    // Body
    this.body = mesh(box(0.65, 0.95, 0.38), mat(C.playerBody), 0, 1.25, 0);
    this.group.add(this.body);

    // Head
    this.head = mesh(box(0.42, 0.42, 0.38), mat(C.skin), 0, 2, 0);
    this.group.add(this.head);

    // Beanie
    this.group.add(mesh(box(0.46, 0.2, 0.42), mat(0x333355), 0, 2.3, 0));

    // Eyes
    this.group.add(mesh(box(0.08, 0.06, 0.04), mat(0x111111), -0.1, 2.02, 0.2));
    this.group.add(mesh(box(0.08, 0.06, 0.04), mat(0x111111), 0.1, 2.02, 0.2));

    // Legs
    this.leftLeg = mesh(box(0.24, 0.75, 0.28), mat(C.playerPants), -0.17, 0.48, 0);
    this.rightLeg = mesh(box(0.24, 0.75, 0.28), mat(C.playerPants), 0.17, 0.48, 0);
    this.group.add(this.leftLeg);
    this.group.add(this.rightLeg);

    // Arms
    this.leftArm = mesh(box(0.18, 0.7, 0.22), mat(C.playerBody), -0.46, 1.15, 0);
    this.rightArm = mesh(box(0.18, 0.7, 0.22), mat(C.playerBody), 0.46, 1.15, 0);
    this.group.add(this.leftArm);
    this.group.add(this.rightArm);

    // Shoes
    this.group.add(mesh(box(0.26, 0.12, 0.35), mat(0x222222), -0.17, 0.06, 0.04));
    this.group.add(mesh(box(0.26, 0.12, 0.35), mat(0x222222), 0.17, 0.06, 0.04));

    // Shadow blob
    const shadow = mesh(new THREE.PlaneGeometry(1.2, 1.2),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 }), 0, 0.02, 0);
    shadow.rotation.x = -Math.PI / 2;
    shadow.castShadow = false;
    this.group.add(shadow);
  }

  moveTo(target) {
    this.targetPos = target.clone();
    this.targetPos.y = 0;
    this.moving = true;
  }

  update(dt, colliders) {
    if (!this.moving || !this.targetPos) {
      this.walkCycle *= 0.9;
      this.animateIdle(dt);
      return;
    }

    const pos = this.group.position;
    const dir = new THREE.Vector3().subVectors(this.targetPos, pos);
    dir.y = 0;
    const dist = dir.length();

    if (dist < 0.3) {
      this.moving = false;
      this.targetPos = null;
      return;
    }

    dir.normalize();

    // Face movement direction
    const targetAngle = Math.atan2(dir.x, dir.z);
    let angleDiff = targetAngle - this.group.rotation.y;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    this.group.rotation.y += angleDiff * Math.min(1, dt * 10);

    // Move
    const step = MOVE_SPEED * dt;
    const newX = pos.x + dir.x * step;
    const newZ = pos.z + dir.z * step;

    // Collision check
    let blocked = false;
    for (const c of colliders) {
      if (Math.abs(newX - c.x) < (c.w / 2 + 0.5) && Math.abs(newZ - c.z) < (c.d / 2 + 0.5)) {
        blocked = true; break;
      }
    }

    if (!blocked) {
      pos.x = Math.max(-WORLD_SIZE + 2, Math.min(WORLD_SIZE - 2, newX));
      pos.z = Math.max(-WORLD_SIZE + 2, Math.min(WORLD_SIZE - 2, newZ));
    } else {
      this.moving = false;
    }

    // Walk animation
    this.walkCycle += dt * 10;
    this.animateWalk();
  }

  animateWalk() {
    const s = Math.sin(this.walkCycle);
    const c = Math.cos(this.walkCycle);
    this.leftLeg.rotation.x = s * 0.5;
    this.rightLeg.rotation.x = -s * 0.5;
    this.leftArm.rotation.x = -s * 0.4;
    this.rightArm.rotation.x = s * 0.4;
    this.body.position.y = 1.25 + Math.abs(s) * 0.05;
    this.head.position.y = 2 + Math.abs(s) * 0.05;
  }

  animateIdle(dt) {
    const t = performance.now() * 0.002;
    this.body.position.y = 1.25 + Math.sin(t) * 0.015;
    this.head.position.y = 2 + Math.sin(t) * 0.015;
    this.leftLeg.rotation.x *= 0.95;
    this.rightLeg.rotation.x *= 0.95;
    this.leftArm.rotation.x *= 0.95;
    this.rightArm.rotation.x *= 0.95;
  }

  get position() { return this.group.position; }
}

// ═══════════════════════════════════════════
// NPC CONTROLLER
// ═══════════════════════════════════════════
class NPCController {
  static update(npcs, dt) {
    npcs.forEach(npc => {
      const d = npc.userData;
      if (!d.npc) return;

      if (d.waiting) {
        d.waitTime -= dt;
        if (d.waitTime <= 0) {
          d.waiting = false;
          d.target = new THREE.Vector3(rng(-25, 25), 0, rng(-25, 25));
        }
        return;
      }

      const dir = new THREE.Vector3().subVectors(d.target, npc.position);
      dir.y = 0;
      if (dir.length() < 1) {
        d.waiting = true;
        d.waitTime = rng(2, 8);
        return;
      }

      dir.normalize();
      npc.position.x += dir.x * NPC_SPEED * dt;
      npc.position.z += dir.z * NPC_SPEED * dt;

      // Face direction
      const angle = Math.atan2(dir.x, dir.z);
      npc.rotation.y += (angle - npc.rotation.y) * Math.min(1, dt * 5);

      // Walk anim
      const t = performance.now() * 0.008 + npc.id;
      const la = npc.getObjectByName('leftArm');
      const ra = npc.getObjectByName('rightArm');
      if (la) la.rotation.x = Math.sin(t) * 0.4;
      if (ra) ra.rotation.x = -Math.sin(t) * 0.4;
    });
  }
}

// ═══════════════════════════════════════════
// CAMERA CONTROLLER
// ═══════════════════════════════════════════
class CameraController {
  constructor(camera) {
    this.camera = camera;
    this.distance = 18;
    this.minDist = 8;
    this.maxDist = 30;
    this.angle = Math.PI / 4;
    this.elevation = Math.PI / 5;
    this.target = new THREE.Vector3();
    this.lerpSpeed = 3;
  }

  update(playerPos, dt) {
    // Smooth follow
    this.target.lerp(playerPos, Math.min(1, this.lerpSpeed * dt));

    const x = this.target.x + Math.sin(this.angle) * Math.cos(this.elevation) * this.distance;
    const y = this.target.y + Math.sin(this.elevation) * this.distance;
    const z = this.target.z + Math.cos(this.angle) * Math.cos(this.elevation) * this.distance;

    this.camera.position.set(x, y, z);
    this.camera.lookAt(this.target.x, this.target.y + 1, this.target.z);
  }

  rotate(dx) {
    this.angle += dx * 0.005;
  }

  zoom(delta) {
    this.distance = Math.max(this.minDist, Math.min(this.maxDist, this.distance + delta));
  }
}

// ═══════════════════════════════════════════
// INPUT HANDLER
// ═══════════════════════════════════════════
class InputHandler {
  constructor(canvas, camera, player, interactables, camCtrl) {
    this.canvas = canvas;
    this.camera = camera;
    this.player = player;
    this.interactables = interactables;
    this.camCtrl = camCtrl;
    this.raycaster = new THREE.Raycaster();
    this.mouse = new THREE.Vector2();
    this.touchStart = null;
    this.touchStartTime = 0;
    this.isDragging = false;
    this.pinchStart = 0;
    this.onInteract = null;
    this.groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    this.setupTouch();
    this.setupMouse();
  }

  setupTouch() {
    let lastTouches = null;

    this.canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 1) {
        this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        this.touchStartTime = performance.now();
        this.isDragging = false;
      } else if (e.touches.length === 2) {
        this.pinchStart = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: false });

    this.canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && this.touchStart) {
        const dx = e.touches[0].clientX - this.touchStart.x;
        const dy = e.touches[0].clientY - this.touchStart.y;
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          this.isDragging = true;
          this.camCtrl.rotate(dx * 0.3);
          this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      } else if (e.touches.length === 2 && this.pinchStart) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const delta = (this.pinchStart - dist) * 0.05;
        this.camCtrl.zoom(delta);
        this.pinchStart = dist;
      }
    }, { passive: false });

    this.canvas.addEventListener('touchend', e => {
      if (!this.isDragging && this.touchStart && performance.now() - this.touchStartTime < 300) {
        this.handleTap(this.touchStart.x, this.touchStart.y);
      }
      this.touchStart = null;
      this.isDragging = false;
    });
  }

  setupMouse() {
    let mouseDown = false, mouseStart = null, dragged = false;

    this.canvas.addEventListener('mousedown', e => {
      mouseDown = true;
      mouseStart = { x: e.clientX, y: e.clientY };
      dragged = false;
    });

    this.canvas.addEventListener('mousemove', e => {
      if (mouseDown && mouseStart) {
        const dx = e.clientX - mouseStart.x;
        if (Math.abs(dx) > 5) {
          dragged = true;
          this.camCtrl.rotate(dx * 0.3);
          mouseStart = { x: e.clientX, y: e.clientY };
        }
      }
    });

    this.canvas.addEventListener('mouseup', e => {
      if (!dragged && mouseStart) {
        this.handleTap(e.clientX, e.clientY);
      }
      mouseDown = false;
      mouseStart = null;
    });

    this.canvas.addEventListener('wheel', e => {
      this.camCtrl.zoom(e.deltaY * 0.02);
    }, { passive: true });
  }

  handleTap(clientX, clientY) {
    const rect = this.canvas.getBoundingClientRect();
    this.mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    this.mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    this.raycaster.setFromCamera(this.mouse, this.camera);

    // Check interactive objects first
    const allMeshes = [];
    this.interactables.forEach(obj => {
      obj.traverse(child => { if (child.isMesh) allMeshes.push(child); });
    });
    const hits = this.raycaster.intersectObjects(allMeshes, false);
    for (const hit of hits) {
      let obj = hit.object;
      while (obj && !obj.userData?.interactive) obj = obj.parent;
      if (obj?.userData?.interactive) {
        const dist = this.player.position.distanceTo(obj.position.clone().setY(0));
        if (dist < INTERACT_DIST + 1) {
          if (this.onInteract) this.onInteract(obj);
          return;
        } else {
          // Walk towards it
          this.player.moveTo(obj.position);
          return;
        }
      }
    }

    // Raycast to ground
    const intersection = new THREE.Vector3();
    this.raycaster.ray.intersectPlane(this.groundPlane, intersection);
    if (intersection) {
      this.player.moveTo(intersection);
    }
  }
}

// ═══════════════════════════════════════════
// UI MANAGER
// ═══════════════════════════════════════════
class UIManager {
  constructor(state) {
    this.state = state;
    this.toastContainer = document.getElementById('toasts');
    this.actionsPanel = document.getElementById('actions');
    this.actionBtns = document.getElementById('actionBtns');
    this.actionLabel = document.getElementById('actionLabel');
    this.prompt = document.getElementById('prompt');
    this.currentActions = [];
  }

  update() {
    const s = this.state;
    document.getElementById('barHP').style.width = s.health + '%';
    document.getElementById('barHunger').style.width = s.hunger + '%';
    document.getElementById('barMoney').style.width = Math.min(100, s.money * 4) + '%';
    document.getElementById('barResp').style.width = s.respect + '%';
    document.getElementById('valHP').textContent = Math.round(s.health);
    document.getElementById('valHunger').textContent = Math.round(s.hunger);
    document.getElementById('valMoney').textContent = s.money.toFixed(2) + '€';
    document.getElementById('valResp').textContent = Math.round(s.respect);
    document.getElementById('dayNum').textContent = s.day;

    const h = Math.floor(s.gameTime / 60);
    const m = Math.floor(s.gameTime % 60);
    document.getElementById('clock').textContent =
      String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  showActions(label, actions) {
    const key = JSON.stringify(actions.map(a => a.label));
    if (key === this._lastKey) return;
    this._lastKey = key;
    this.actionLabel.textContent = label;
    this.actionBtns.innerHTML = '';
    actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.textContent = a.label;
      btn.addEventListener('click', e => { e.stopPropagation(); a.fn(); });
      btn.addEventListener('touchend', e => { e.stopPropagation(); });
      this.actionBtns.appendChild(btn);
    });
    this.actionsPanel.classList.add('show');
  }

  hideActions() {
    this.actionsPanel.classList.remove('show');
    this._lastKey = null;
  }

  toast(text, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = text;
    this.toastContainer.appendChild(t);
    setTimeout(() => t.remove(), 2700);
  }

  showPrompt(text) {
    this.prompt.textContent = text;
    this.prompt.classList.add('show');
  }

  hidePrompt() {
    this.prompt.classList.remove('show');
  }
}

// ═══════════════════════════════════════════
// INTERACTION SYSTEM
// ═══════════════════════════════════════════
class Interactions {
  constructor(state, ui, world) {
    this.state = state;
    this.ui = ui;
    this.world = world;
  }

  searchTrash(obj) {
    const id = obj.userData.id || 'default';
    const cooldowns = this.state.searchCooldowns;
    if (cooldowns.has(id) && Date.now() - cooldowns.get(id) < 30000) {
      this.ui.toast('Hier schon gesucht... warte kurz', 'bad');
      return;
    }
    cooldowns.set(id, Date.now());

    const roll = Math.random();
    if (roll < 0.35) {
      this.state.bottles++;
      this.ui.toast('🍾 Flasche gefunden! (Pfand 0.25€)', 'good');
    } else if (roll < 0.55) {
      this.state.hunger = Math.max(0, this.state.hunger - 12);
      this.ui.toast('🍕 Essensreste gefunden! Hunger -12', 'good');
    } else if (roll < 0.70) {
      const found = rng(0.5, 3);
      this.state.money += found;
      this.ui.toast(`💰 ${found.toFixed(2)}€ gefunden!`, 'money');
    } else if (roll < 0.85) {
      this.ui.toast('Nichts brauchbares...', 'info');
    } else {
      this.state.health -= 5;
      this.ui.toast('🤮 Etwas Ekliges angefasst! HP -5', 'bad');
    }
    this.state.clamp();
  }

  collectBottle(obj) {
    this.state.bottles++;
    this.ui.toast('🍾 Flasche aufgehoben!', 'good');
    // Remove from scene
    obj.visible = false;
    obj.userData.interactive = false;
    const idx = this.world.interactables.indexOf(obj);
    if (idx > -1) this.world.interactables.splice(idx, 1);
    // Respawn after 60s
    setTimeout(() => {
      obj.visible = true;
      obj.userData.interactive = true;
      this.world.interactables.push(obj);
    }, 60000);
  }

  beg(npcType) {
    const respectBonus = this.state.respect / 200;
    const tourBonus = npcType === 'tourist' ? 0.2 : 0;
    const roll = Math.random() + respectBonus + tourBonus;

    if (roll > 0.7) {
      const amount = rng(0.2, npcType === 'tourist' ? 2.5 : 1.0);
      this.state.money += amount;
      this.ui.toast(`🙏 Jemand gab dir ${amount.toFixed(2)}€`, 'money');
    } else if (roll > 0.4) {
      this.ui.toast('😐 Ignoriert...', 'info');
    } else if (roll > 0.2) {
      this.state.hunger = Math.max(0, this.state.hunger - 8);
      this.ui.toast('🥪 Jemand gab dir ein Brötchen!', 'good');
    } else {
      this.state.respect = Math.max(0, this.state.respect - 3);
      this.ui.toast('😤 "Verpiss dich!" Respekt -3', 'bad');
    }
    this.state.clamp();
  }

  fightPunk() {
    const winChance = 0.3 + (this.state.health / 300) + (this.state.respect / 300);
    if (Math.random() < winChance) {
      const money = rng(1, 5);
      this.state.money += money;
      this.state.respect += 8;
      this.state.health -= rng(5, 15);
      this.ui.toast(`👊 Gewonnen! +${money.toFixed(2)}€, +8 Respekt`, 'good');
    } else {
      this.state.health -= rng(20, 35);
      const lost = Math.min(this.state.money, rng(1, 3));
      this.state.money -= lost;
      this.state.respect = Math.max(0, this.state.respect - 5);
      this.ui.toast(`💀 Verloren! -${lost.toFixed(2)}€, HP runter`, 'bad');
    }
    this.state.clamp();
  }

  sleepOnBench() {
    this.state.health = Math.min(100, this.state.health + 20);
    this.state.hunger = Math.min(100, this.state.hunger + 12);
    this.state.gameTime += 120; // 2 hours pass
    if (this.state.gameTime >= 1440) {
      this.state.gameTime -= 1440;
      this.state.day++;
    }

    if (Math.random() < 0.12) {
      const lost = Math.min(this.state.money, rng(1, 5));
      this.state.money -= lost;
      this.ui.toast(`😴 Geschlafen... aber ${lost.toFixed(2)}€ geklaut!`, 'bad');
    } else {
      this.ui.toast('😴 Etwas ausgeruht. HP +20', 'good');
    }
    this.state.clamp();
  }

  openShop() {
    document.getElementById('bottleCount').textContent = this.state.bottles;
    document.getElementById('shop').classList.add('show');
  }

  buyItem(item) {
    const prices = { doner: 5, beer: 2, cigs: 6, aspirin: 4 };
    const price = prices[item];
    if (this.state.money < price) {
      this.ui.toast('Nicht genug Geld!', 'bad');
      return;
    }
    this.state.money -= price;
    switch (item) {
      case 'doner':
        this.state.hunger = Math.max(0, this.state.hunger - 40);
        this.ui.toast('🥙 Döner gegessen! Hunger -40', 'good'); break;
      case 'beer':
        this.state.hunger = Math.max(0, this.state.hunger - 5);
        this.state.health -= 5;
        this.state.respect += 3;
        this.ui.toast('🍺 Prost! Respekt +3', 'good'); break;
      case 'cigs':
        this.state.respect += 5;
        this.ui.toast('🚬 Cool. Respekt +5', 'good'); break;
      case 'aspirin':
        this.state.health = Math.min(100, this.state.health + 25);
        this.ui.toast('💊 HP +25!', 'good'); break;
    }
    this.state.clamp();
    this.ui.update();
    document.getElementById('bottleCount').textContent = this.state.bottles;
  }

  sellBottles() {
    if (this.state.bottles <= 0) {
      this.ui.toast('Keine Flaschen zum Verkaufen', 'info');
      return;
    }
    const earned = this.state.bottles * 0.25;
    this.state.money += earned;
    this.ui.toast(`🍾 ${this.state.bottles} Flaschen verkauft: +${earned.toFixed(2)}€`, 'money');
    this.state.bottles = 0;
    this.state.clamp();
    this.ui.update();
    document.getElementById('bottleCount').textContent = 0;
  }
}

// ═══════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════
class Particles {
  constructor(scene) {
    this.scene = scene;
    this.particles = [];
  }

  emit(pos, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const geo = sphere(rng(0.03, 0.08), 4, 3);
      const m = new THREE.Mesh(geo, matEmit(color));
      m.position.copy(pos);
      m.position.y += 1;
      const vel = new THREE.Vector3(rng(-2, 2), rng(1, 4), rng(-2, 2));
      this.particles.push({ mesh: m, vel, life: 1 });
      this.scene.add(m);
    }
  }

  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.vel.y -= 6 * dt;
      p.mesh.position.addScaledVector(p.vel, dt);
      p.life -= dt * 1.5;
      p.mesh.material.opacity = Math.max(0, p.life);
      p.mesh.material.transparent = true;
      if (p.life <= 0) {
        this.scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        this.particles.splice(i, 1);
      }
    }
  }
}

// ═══════════════════════════════════════════
// MAIN GAME
// ═══════════════════════════════════════════
class Game {
  constructor() {
    this.state = new GameState();
    this.clock = new THREE.Clock();
    this.running = false;
  }

  init() {
    // Renderer
    this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 0.9;
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(this.renderer.domElement);

    // Scene
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(C.bg);
    this.scene.fog = new THREE.FogExp2(C.bg, 0.012);

    // Camera
    this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 200);
    this.camCtrl = new CameraController(this.camera);

    // Build world
    this.world = new WorldBuilder(this.scene);
    this.world.build();

    // Player
    this.player = new Player(this.scene);

    // Systems
    this.ui = new UIManager(this.state);
    this.interactions = new Interactions(this.state, this.ui, this.world);
    this.particles = new Particles(this.scene);
    this.input = new InputHandler(
      this.renderer.domElement, this.camera, this.player,
      this.world.interactables, this.camCtrl
    );
    this.input.onInteract = obj => this.handleInteraction(obj);

    // Shop UI
    document.querySelectorAll('.shop-item-price').forEach(btn => {
      btn.addEventListener('click', () => this.interactions.buyItem(btn.dataset.item));
    });
    document.getElementById('sellBottles').addEventListener('click', () => this.interactions.sellBottles());
    document.getElementById('shopClose').addEventListener('click', () => {
      document.getElementById('shop').classList.remove('show');
    });
    document.getElementById('retryBtn').addEventListener('click', () => this.restart());

    // Resize
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Title screen
    document.getElementById('loading').style.display = 'none';
    document.getElementById('title').addEventListener('click', () => this.start());
    document.getElementById('title').addEventListener('touchend', () => this.start());

    // Start render loop (title screen visible)
    this.animate();
  }

  start() {
    if (this.running) return;
    this.running = true;
    document.getElementById('title').classList.add('hidden');
    document.getElementById('ui').classList.add('active');
    this.state.reset();
    this.ui.update();
    this.clock.start();
    this.ui.toast('Willkommen am Bahnhof. Überlebe!', 'info');
  }

  restart() {
    this.state.reset();
    this.player.group.position.set(0, 0, 5);
    document.getElementById('gameover').classList.remove('show');
    document.getElementById('ui').classList.add('active');
    this.ui.update();
    this.ui.toast('Neuer Versuch. Viel Glück!', 'info');
    this.running = true;
  }

  handleInteraction(obj) {
    const type = obj.userData.type || obj.userData.npcType;
    switch (type) {
      case 'trashbin':
        this.interactions.searchTrash(obj);
        this.particles.emit(obj.position, C.neonOrange, 6);
        break;
      case 'bottle':
        this.interactions.collectBottle(obj);
        this.particles.emit(obj.position, C.neonGreen, 5);
        break;
      case 'bench':
        this.interactions.sleepOnBench();
        this.particles.emit(this.player.position, C.neonBlue, 8);
        break;
      case 'spati':
        this.interactions.openShop();
        break;
      case 'passerby':
      case 'tourist':
        this.interactions.beg(type);
        this.particles.emit(obj.position, 0xffdd44, 5);
        break;
      case 'punk':
        this.showPunkActions(obj);
        break;
    }
    this.ui.update();
  }

  showPunkActions(obj) {
    this.ui.showActions('Punk', [
      { label: '🙏 Betteln', fn: () => { this.interactions.beg('punk'); this.ui.hideActions(); this.ui.update(); }},
      { label: '👊 Kämpfen', fn: () => { this.interactions.fightPunk(); this.particles.emit(obj.position, C.red, 12); this.ui.hideActions(); this.ui.update(); }},
    ]);
    setTimeout(() => this.ui.hideActions(), 5000);
  }

  updateGlowRings() {
    const t = performance.now() * 0.003;
    this.scene.traverse(obj => {
      if (obj.userData?.glowRing) {
        obj.material.opacity = 0.4 + Math.sin(t + obj.id) * 0.3;
        obj.material.transparent = true;
        obj.scale.setScalar(1 + Math.sin(t * 1.5 + obj.id) * 0.08);
      }
    });
  }

  updateProximity() {
    let nearest = null;
    let nearDist = Infinity;

    this.world.interactables.forEach(obj => {
      if (!obj.userData.interactive || !obj.visible) return;
      const worldPos = new THREE.Vector3();
      obj.getWorldPosition(worldPos);
      worldPos.y = 0;
      const d = this.player.position.distanceTo(worldPos);
      if (d < INTERACT_DIST && d < nearDist) {
        nearest = obj;
        nearDist = d;
      }
    });

    if (nearest) {
      this.ui.showPrompt(nearest.userData.label || 'Interagieren');
    } else {
      this.ui.hidePrompt();
      this.ui.hideActions();
    }
  }

  updateGameTime(dt) {
    // 1 real second = 2 game minutes
    this.state.gameTime += dt * 2;
    if (this.state.gameTime >= 1440) {
      this.state.gameTime -= 1440;
      this.state.day++;
      this.ui.toast(`☀️ Tag ${this.state.day}`, 'info');
    }

    // Stat decay
    this.state.totalTime += dt;
    if (this.state.totalTime > 1) {
      // Hunger increases
      this.state.hunger += 0.15;
      // If very hungry, lose health
      if (this.state.hunger > 80) {
        this.state.health -= 0.08;
      }
      // Slow health regen if not hungry
      if (this.state.hunger < 40 && this.state.health < 100) {
        this.state.health += 0.03;
      }
      this.state.clamp();

      if (!this.state.alive) {
        this.gameOver();
      }
    }
  }

  gameOver() {
    this.running = false;
    document.getElementById('ui').classList.remove('active');
    document.getElementById('survived').textContent = `Du hast ${this.state.day} Tag${this.state.day > 1 ? 'e' : ''} überlebt`;
    document.getElementById('gameover').classList.add('show');
  }

  updateNeonFlicker() {
    const t = performance.now();
    // Occasional flicker on neon signs
    this.scene.traverse(obj => {
      if (obj.isPointLight && obj.intensity > 1) {
        const flicker = Math.sin(t * 0.01 + obj.id * 100) > 0.95 ? 0.3 : 1;
        obj.intensity = obj.userData.baseIntensity ?
          obj.userData.baseIntensity * flicker :
          (obj.userData.baseIntensity = obj.intensity, obj.intensity * flicker);
      }
    });
  }

  animate() {
    requestAnimationFrame(() => this.animate());
    const dt = Math.min(this.clock.getDelta(), 0.1);

    if (this.running) {
      this.player.update(dt, this.world.colliders);
      NPCController.update(this.world.npcs, dt);
      this.camCtrl.update(this.player.position, dt);
      this.updateGameTime(dt);
      this.updateProximity();
      this.particles.update(dt);
      this.ui.update();
    } else {
      // Title screen camera orbit
      const t = performance.now() * 0.0003;
      this.camera.position.set(Math.sin(t) * 30, 18, Math.cos(t) * 30);
      this.camera.lookAt(0, 2, 0);
    }

    this.updateGlowRings();
    this.updateNeonFlicker();
    this.renderer.render(this.scene, this.camera);
  }
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
const game = new Game();
game.init();
