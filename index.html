<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIEZKINGS DEBUG</title>
    <style>
        body { margin: 0; font-family: Arial; background: #000; color: white; }
        #debug { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; }
        #canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="debug">
        <div id="webgl-status">WebGL Status: Checking...</div>
        <div id="threejs-status">Three.js Status: Loading...</div>
        <div id="scene-status">Scene Status: Creating...</div>
        <div id="camera-status">Camera: Positioning...</div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        // Debug WebGL support
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        document.getElementById('webgl-status').textContent = 'WebGL: ' + (gl ? 'SUPPORTED ✅' : 'NOT SUPPORTED ❌');

        if (!gl) {
            document.getElementById('debug').innerHTML += '<div style="color:red">❌ WebGL not supported on this device!</div>';
        }

        // Load Three.js
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        script.onload = () => {
            document.getElementById('threejs-status').textContent = 'Three.js: LOADED ✅';
            initGame();
        };
        script.onerror = () => {
            document.getElementById('threejs-status').textContent = 'Three.js: FAILED ❌';
        };
        document.head.appendChild(script);

        function initGame() {
            try {
                // Create basic scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x001122);
                document.getElementById('scene-status').textContent = 'Scene: CREATED ✅';

                // Create camera
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(10, 10, 10);
                camera.lookAt(0, 0, 0);
                document.getElementById('camera-status').textContent = 'Camera: POSITIONED ✅';

                // Create renderer
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                // Add simple test objects
                const geometry = new THREE.BoxGeometry();
                const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // Add another test object
                const sphereGeometry = new THREE.SphereGeometry(0.5);
                const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                sphere.position.set(2, 0, 0);
                scene.add(sphere);

                // Add ground plane
                const planeGeometry = new THREE.PlaneGeometry(20, 20);
                const planeMaterial = new THREE.MeshBasicMaterial({ color: 0x333333 });
                const plane = new THREE.Mesh(planeGeometry, planeMaterial);
                plane.rotation.x = -Math.PI / 2;
                scene.add(plane);

                document.getElementById('debug').innerHTML += '<div style="color:green">✅ Test objects created!</div>';

                // Animation loop
                function animate() {
                    requestAnimationFrame(animate);
                    
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    
                    renderer.render(scene, camera);
                }
                
                animate();
                document.getElementById('debug').innerHTML += '<div style="color:green">✅ Animation started!</div>';

                // Touch controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };

                canvas.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    const touch = e.touches[0];
                    previousMousePosition.x = touch.clientX;
                    previousMousePosition.y = touch.clientY;
                    e.preventDefault();
                });

                canvas.addEventListener('touchmove', (e) => {
                    if (isDragging) {
                        const touch = e.touches[0];
                        const deltaX = touch.clientX - previousMousePosition.x;
                        const deltaY = touch.clientY - previousMousePosition.y;

                        // Rotate camera
                        const spherical = new THREE.Spherical();
                        spherical.setFromVector3(camera.position);
                        spherical.theta -= deltaX * 0.01;
                        spherical.phi += deltaY * 0.01;
                        spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));

                        camera.position.setFromSpherical(spherical);
                        camera.lookAt(0, 0, 0);

                        previousMousePosition.x = touch.clientX;
                        previousMousePosition.y = touch.clientY;
                    }
                    e.preventDefault();
                });

                canvas.addEventListener('touchend', () => {
                    isDragging = false;
                });

                // Window resize
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                document.getElementById('debug').innerHTML += '<div style="color:red">❌ Error: ' + error.message + '</div>';
                console.error('Game init error:', error);
            }
        }
    </script>
</body>
</html>
