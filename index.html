<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>KIEZKINGS - Berlin Street Survival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: #0a0a1a; touch-action: none;
  font-family: 'Russo One', sans-serif;
}
canvas { display: block; width: 100%; height: 100%; }

/* ===== TITLE SCREEN ===== */
#title-screen {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a0020 0%, #1a0040 30%, #0a0030 60%, #000020 100%);
  overflow: hidden;
}
#title-screen::before {
  content: ''; position: absolute; inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(255,0,128,0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.3) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(128,0,255,0.2) 0%, transparent 60%);
  animation: bgPulse 4s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { opacity: 0.6; } 100% { opacity: 1; }
}
.title-graffiti {
  position: absolute; font-family: 'Bangers', cursive; font-size: 8vw; opacity: 0.08;
  color: #ff00ff; transform: rotate(-15deg);
}
.title-graffiti:nth-child(2) { top: 10%; left: 5%; color: #00ffff; transform: rotate(10deg); }
.title-graffiti:nth-child(3) { bottom: 15%; right: 5%; color: #ff6600; transform: rotate(-8deg); }
.title-graffiti:nth-child(4) { top: 60%; left: 60%; color: #00ff66; transform: rotate(20deg); }

.title-main {
  position: relative; z-index: 2; text-align: center;
}
.title-main h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(3rem, 15vw, 8rem);
  background: linear-gradient(180deg, #ff2d95 0%, #ff6b35 25%, #ffd700 50%, #00e5ff 75%, #7c4dff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,45,149,0.8)) drop-shadow(0 0 40px rgba(0,229,255,0.5));
  letter-spacing: 4px;
  animation: titleFloat 3s ease-in-out infinite;
  text-transform: uppercase;
}
@keyframes titleFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.02); }
}
.title-sub {
  font-family: 'Russo One', sans-serif;
  font-size: clamp(0.8rem, 3vw, 1.4rem);
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
  margin-top: 8px; letter-spacing: 8px;
  text-transform: uppercase;
}
.title-tagline {
  font-family: 'Bangers', cursive;
  font-size: clamp(1rem, 4vw, 2rem);
  color: #ffd700;
  text-shadow: 0 0 15px rgba(255,215,0,0.8);
  margin-top: 20px;
  animation: tagPulse 2s ease-in-out infinite;
}
@keyframes tagPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.98); }
}

#start-btn {
  position: relative; z-index: 2;
  margin-top: 40px; padding: 18px 60px;
  font-family: 'Bangers', cursive; font-size: clamp(1.4rem, 5vw, 2.2rem);
  color: #fff; border: none; cursor: pointer;
  background: linear-gradient(135deg, #ff2d95, #ff6b35, #ffd700);
  border-radius: 50px;
  box-shadow: 0 0 30px rgba(255,45,149,0.6), 0 0 60px rgba(255,107,53,0.3), inset 0 2px 0 rgba(255,255,255,0.3);
  text-transform: uppercase; letter-spacing: 3px;
  animation: btnGlow 2s ease-in-out infinite alternate;
  transition: transform 0.2s;
}
#start-btn:active { transform: scale(0.95); }
@keyframes btnGlow {
  0% { box-shadow: 0 0 30px rgba(255,45,149,0.6), 0 0 60px rgba(255,107,53,0.3); }
  100% { box-shadow: 0 0 50px rgba(255,45,149,0.8), 0 0 100px rgba(255,107,53,0.5), 0 0 150px rgba(255,215,0,0.3); }
}
.title-hint {
  position: relative; z-index: 2;
  margin-top: 30px; color: rgba(255,255,255,0.5);
  font-size: 0.75rem; letter-spacing: 2px;
}

/* ===== HUD ===== */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 8px 12px;
  background: linear-gradient(180deg, rgba(10,0,30,0.85) 0%, rgba(10,0,30,0) 100%);
  display: none;
}
.hud-row { display: flex; gap: 6px; margin-bottom: 4px; }
.stat-bar {
  flex: 1; height: 28px; border-radius: 14px;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.15);
  position: relative; overflow: hidden;
}
.stat-fill {
  height: 100%; border-radius: 12px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.stat-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
  border-radius: 12px;
}
.stat-fill.pulse { animation: statPulse 0.5s ease-out; }
@keyframes statPulse {
  0% { filter: brightness(2); } 100% { filter: brightness(1); }
}
.stat-icon {
  position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
  font-size: 14px; z-index: 2; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
}
.stat-text {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: #fff; z-index: 2;
  font-family: 'Russo One', sans-serif;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}
.fill-hunger { background: linear-gradient(90deg, #ff2d95, #ff6b9d); box-shadow: 0 0 10px rgba(255,45,149,0.5); }
.fill-thirst { background: linear-gradient(90deg, #00b4d8, #00e5ff); box-shadow: 0 0 10px rgba(0,229,255,0.5); }
.fill-energy { background: linear-gradient(90deg, #ffd700, #ffeb3b); box-shadow: 0 0 10px rgba(255,215,0,0.5); }
.fill-health { background: linear-gradient(90deg, #00e676, #69f0ae); box-shadow: 0 0 10px rgba(0,230,118,0.5); }
.fill-money { background: linear-gradient(90deg, #7c4dff, #b388ff); box-shadow: 0 0 10px rgba(124,77,255,0.5); }
.fill-street { background: linear-gradient(90deg, #ff6b35, #ffab40); box-shadow: 0 0 10px rgba(255,107,53,0.5); }

#day-display {
  text-align: center; margin-top: 2px;
  font-family: 'Bangers', cursive; font-size: 14px;
  background: linear-gradient(90deg, #ff2d95, #ffd700, #00e5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(255,45,149,0.5));
}

/* ===== ACTION BUTTONS ===== */
#actions {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 8px 10px 16px;
  background: linear-gradient(0deg, rgba(10,0,30,0.9) 0%, rgba(10,0,30,0) 100%);
  display: none;
}
.action-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; max-width: 500px; margin: 0 auto;
}
.action-btn {
  padding: 12px 4px; border: none; border-radius: 16px;
  font-family: 'Russo One', sans-serif; font-size: 11px;
  color: #fff; cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.action-btn:active { transform: scale(0.92); }
.action-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
  border-radius: 16px;
}
.action-btn .btn-icon { font-size: 22px; }
.action-btn .btn-label { font-size: 10px; opacity: 0.9; }

.btn-food { background: linear-gradient(135deg, #ff2d95, #ff6b35); box-shadow: 0 4px 15px rgba(255,45,149,0.4); }
.btn-drink { background: linear-gradient(135deg, #00b4d8, #0077b6); box-shadow: 0 4px 15px rgba(0,180,216,0.4); }
.btn-sleep { background: linear-gradient(135deg, #7c4dff, #651fff); box-shadow: 0 4px 15px rgba(124,77,255,0.4); }
.btn-work { background: linear-gradient(135deg, #ffd700, #ff9100); box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
.btn-explore { background: linear-gradient(135deg, #00e676, #00c853); box-shadow: 0 4px 15px rgba(0,230,118,0.4); }
.btn-hustle { background: linear-gradient(135deg, #ff6b35, #e65100); box-shadow: 0 4px 15px rgba(255,107,53,0.4); }

/* ===== EVENT LOG ===== */
#event-log {
  position: fixed; left: 50%; bottom: 180px; transform: translateX(-50%);
  z-index: 200; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.event-msg {
  padding: 8px 20px; border-radius: 20px;
  font-family: 'Russo One', sans-serif; font-size: 13px;
  color: #fff; white-space: nowrap;
  animation: eventIn 0.4s ease-out, eventOut 0.5s 2.5s ease-in forwards;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
@keyframes eventIn {
  0% { transform: translateY(20px) scale(0.8); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes eventOut {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-30px); opacity: 0; }
}
.event-good { background: linear-gradient(135deg, rgba(0,230,118,0.9), rgba(0,200,83,0.9)); box-shadow: 0 0 20px rgba(0,230,118,0.5); }
.event-bad { background: linear-gradient(135deg, rgba(255,45,149,0.9), rgba(213,0,0,0.9)); box-shadow: 0 0 20px rgba(255,45,149,0.5); }
.event-neutral { background: linear-gradient(135deg, rgba(0,229,255,0.9), rgba(0,180,216,0.9)); box-shadow: 0 0 20px rgba(0,229,255,0.5); }
.event-epic { background: linear-gradient(135deg, rgba(255,215,0,0.9), rgba(255,145,0,0.9)); box-shadow: 0 0 30px rgba(255,215,0,0.6); font-size: 15px; }

/* ===== GAME OVER ===== */
#game-over {
  position: fixed; inset: 0; z-index: 2000;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10,0,20,0.95);
}
#game-over h2 {
  font-family: 'Bangers', cursive; font-size: clamp(2.5rem, 10vw, 5rem);
  color: #ff2d95;
  text-shadow: 0 0 30px rgba(255,45,149,0.8), 0 0 60px rgba(255,45,149,0.4);
  animation: goShake 0.5s ease-in-out;
}
@keyframes goShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px) rotate(-2deg); }
  75% { transform: translateX(10px) rotate(2deg); }
}
#game-over .go-stats {
  margin: 20px; color: #fff; text-align: center;
  font-family: 'Russo One', sans-serif;
}
#game-over .go-stats p { margin: 8px 0; font-size: 1.1rem; }
#game-over .go-stats span { color: #ffd700; }
#restart-btn {
  margin-top: 20px; padding: 16px 50px;
  font-family: 'Bangers', cursive; font-size: 1.5rem;
  color: #fff; border: none; cursor: pointer;
  background: linear-gradient(135deg, #00e676, #00c853);
  border-radius: 50px;
  box-shadow: 0 0 30px rgba(0,230,118,0.5);
  text-transform: uppercase; letter-spacing: 2px;
}

/* ===== SCREEN FLASH ===== */
#screen-flash {
  position: fixed; inset: 0; z-index: 500;
  pointer-events: none; opacity: 0;
  transition: opacity 0.1s;
}
.flash-good { background: rgba(0,230,118,0.3); }
.flash-bad { background: rgba(255,45,149,0.3); }
.flash-epic { background: rgba(255,215,0,0.4); }

/* ===== FLOATING SCORE ===== */
.float-score {
  position: fixed; z-index: 300; pointer-events: none;
  font-family: 'Bangers', cursive; font-size: 24px;
  animation: floatUp 1.5s ease-out forwards;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-graffiti">KIEZ</div>
  <div class="title-graffiti">BERLIN</div>
  <div class="title-graffiti">STREET</div>
  <div class="title-graffiti">KINGS</div>
  <div class="title-main">
    <h1>KIEZKINGS</h1>
    <div class="title-sub">Berlin Street Survival</div>
    <div class="title-tagline">👑 Werde der König deines Kiezes! 👑</div>
  </div>
  <button id="start-btn">🎮 SPIELEN</button>
  <div class="title-hint">ÜBERLEBST DU IM BERLINER KIEZ?</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <div class="stat-bar">
      <div class="stat-fill fill-hunger" id="bar-hunger" style="width:70%"></div>
      <span class="stat-icon">🍕</span>
      <span class="stat-text" id="txt-hunger">70</span>
    </div>
    <div class="stat-bar">
      <div class="stat-fill fill-thirst" id="bar-thirst" style="width:80%"></div>
      <span class="stat-icon">💧</span>
      <span class="stat-text" id="txt-thirst">80</span>
    </div>
    <div class="stat-bar">
      <div class="stat-fill fill-energy" id="bar-energy" style="width:90%"></div>
      <span class="stat-icon">⚡</span>
      <span class="stat-text" id="txt-energy">90</span>
    </div>
  </div>
  <div class="hud-row">
    <div class="stat-bar">
      <div class="stat-fill fill-health" id="bar-health" style="width:100%"></div>
      <span class="stat-icon">❤️</span>
      <span class="stat-text" id="txt-health">100</span>
    </div>
    <div class="stat-bar">
      <div class="stat-fill fill-money" id="bar-money" style="width:20%"></div>
      <span class="stat-icon">💰</span>
      <span class="stat-text" id="txt-money">20€</span>
    </div>
    <div class="stat-bar">
      <div class="stat-fill fill-street" id="bar-street" style="width:10%"></div>
      <span class="stat-icon">👊</span>
      <span class="stat-text" id="txt-street">10</span>
    </div>
  </div>
  <div id="day-display">TAG 1 - MONTAG MORGEN</div>
</div>

<!-- ACTIONS -->
<div id="actions">
  <div class="action-grid">
    <button class="action-btn btn-food" onclick="doAction('eat')">
      <span class="btn-icon">🍕</span>
      <span class="btn-label">ESSEN</span>
    </button>
    <button class="action-btn btn-drink" onclick="doAction('drink')">
      <span class="btn-icon">🍺</span>
      <span class="btn-label">TRINKEN</span>
    </button>
    <button class="action-btn btn-sleep" onclick="doAction('sleep')">
      <span class="btn-icon">😴</span>
      <span class="btn-label">SCHLAFEN</span>
    </button>
    <button class="action-btn btn-work" onclick="doAction('work')">
      <span class="btn-icon">💼</span>
      <span class="btn-label">ARBEITEN</span>
    </button>
    <button class="action-btn btn-explore" onclick="doAction('explore')">
      <span class="btn-icon">🗺️</span>
      <span class="btn-label">ERKUNDEN</span>
    </button>
    <button class="action-btn btn-hustle" onclick="doAction('hustle')">
      <span class="btn-icon">🎲</span>
      <span class="btn-label">HUSTLE</span>
    </button>
  </div>
</div>

<!-- EVENT LOG -->
<div id="event-log"></div>

<!-- SCREEN FLASH -->
<div id="screen-flash"></div>

<!-- GAME OVER -->
<div id="game-over">
  <h2>GAME OVER</h2>
  <div class="go-stats" id="go-stats"></div>
  <button id="restart-btn" onclick="restartGame()">🔄 NOCHMAL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== GAME STATE =====
const state = {
  hunger: 70, thirst: 80, energy: 90, health: 100,
  money: 20, street: 10,
  day: 1, timeOfDay: 0, // 0=morning, 1=afternoon, 2=evening, 3=night
  alive: true, actionCount: 0
};

const dayNames = ['MONTAG','DIENSTAG','MITTWOCH','DONNERSTAG','FREITAG','SAMSTAG','SONNTAG'];
const timeNames = ['MORGEN','NACHMITTAG','ABEND','NACHT'];

// ===== THREE.JS SCENE =====
let scene, camera, renderer, clock;
let buildings = [], particles = [], neonSigns = [], trashBins = [];
let character, characterGroup;
let streetParticles = [];
let ambientParticles = [];
let groundPlane;

function initThree() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a0040, 0.008);
  
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 8, 18);
  camera.lookAt(0, 2, 0);
  
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
  
  clock = new THREE.Clock();
  
  // Sky gradient
  const skyGeo = new THREE.SphereGeometry(100, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x4a90d9) },
      bottomColor: { value: new THREE.Color(0xff9966) },
      offset: { value: 10 },
      exponent: { value: 0.4 }
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition + offset).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
      }
    `
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
  
  // Lighting - BRIGHT and colorful
  const ambientLight = new THREE.AmbientLight(0xfff0e0, 0.6);
  scene.add(ambientLight);
  
  const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
  sunLight.position.set(10, 20, 10);
  sunLight.castShadow = false;
  scene.add(sunLight);
  
  // Colored point lights for neon glow
  const neonColors = [0xff2d95, 0x00e5ff, 0x7c4dff, 0xff6b35, 0x00e676, 0xffd700];
  for (let i = 0; i < 8; i++) {
    const pl = new THREE.PointLight(neonColors[i % neonColors.length], 2, 20);
    pl.position.set((Math.random() - 0.5) * 30, 4 + Math.random() * 3, (Math.random() - 0.5) * 20);
    scene.add(pl);
  }
  
  createGround();
  createBuildings();
  createCharacter();
  createNeonSigns();
  createTrashBins();
  createStreetLights();
  createAmbientParticles();
  createGraffitiDecals();
}

function createGround() {
  // Colorful ground with street art pattern
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  
  // Base
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(0, 0, 512, 512);
  
  // Colorful street art on ground
  const colors = ['#ff2d95', '#00e5ff', '#7c4dff', '#ff6b35', '#00e676', '#ffd700', '#ff4444'];
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.globalAlpha = 0.15 + Math.random() * 0.2;
    ctx.beginPath();
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const s = 20 + Math.random() * 60;
    if (Math.random() > 0.5) {
      ctx.arc(x, y, s, 0, Math.PI * 2);
    } else {
      ctx.fillRect(x, y, s, s * (0.5 + Math.random()));
    }
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Road markings
  ctx.fillStyle = '#ffd700';
  ctx.globalAlpha = 0.6;
  for (let x = 0; x < 512; x += 80) {
    ctx.fillRect(x, 250, 40, 8);
  }
  ctx.globalAlpha = 1;
  
  // Sidewalk lines
  ctx.strokeStyle = '#ff2d9544';
  ctx.lineWidth = 3;
  ctx.setLineDash([20, 10]);
  ctx.beginPath(); ctx.moveTo(0, 150); ctx.lineTo(512, 150); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 360); ctx.lineTo(512, 360); ctx.stroke();
  
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  scene.add(ground);
  groundPlane = ground;
}

function makeGraffitiTexture(width, height, baseColor) {
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  
  // Base color
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, width, height);
  
  // Brick pattern
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y = 0; y < height; y += 20) {
    const off = (Math.floor(y / 20) % 2) * 25;
    for (let x = off; x < width; x += 50) {
      ctx.fillRect(x, y, 48, 18);
    }
  }
  
  // Graffiti art
  const graffitiColors = ['#ff2d95', '#00e5ff', '#ffd700', '#00e676', '#ff6b35', '#7c4dff', '#ff4444', '#ffffff'];
  
  // Large shapes
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = graffitiColors[Math.floor(Math.random() * graffitiColors.length)];
    ctx.globalAlpha = 0.3 + Math.random() * 0.4;
    const x = Math.random() * width;
    const y = Math.random() * height;
    const w = 40 + Math.random() * 100;
    const h = 30 + Math.random() * 80;
    
    ctx.beginPath();
    if (Math.random() > 0.6) {
      ctx.arc(x, y, w / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const r = 10;
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.fill();
    }
  }
  
  // Spray strokes
  for (let i = 0; i < 8; i++) {
    ctx.strokeStyle = graffitiColors[Math.floor(Math.random() * graffitiColors.length)];
    ctx.globalAlpha = 0.4 + Math.random() * 0.4;
    ctx.lineWidth = 3 + Math.random() * 8;
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.beginPath();
    let x = Math.random() * width;
    let y = Math.random() * height;
    ctx.moveTo(x, y);
    for (let j = 0; j < 5; j++) {
      x += (Math.random() - 0.5) * 80;
      y += (Math.random() - 0.5) * 60;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  
  // Tags / text-like marks
  const tags = ['KIEZ', 'BLN', '⭐', '♛', 'KINGS', 'X36', 'FCK'];
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 3; i++) {
    ctx.font = `bold ${20 + Math.random() * 30}px 'Bangers', Impact, sans-serif`;
    ctx.fillStyle = graffitiColors[Math.floor(Math.random() * graffitiColors.length)];
    const tag = tags[Math.floor(Math.random() * tags.length)];
    ctx.save();
    ctx.translate(Math.random() * width, Math.random() * height);
    ctx.rotate((Math.random() - 0.5) * 0.6);
    ctx.fillText(tag, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  
  // Drips
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = graffitiColors[Math.floor(Math.random() * graffitiColors.length)];
    ctx.globalAlpha = 0.3 + Math.random() * 0.3;
    const x = Math.random() * width;
    const y = Math.random() * (height * 0.5);
    const dripLen = 30 + Math.random() * 80;
    ctx.fillRect(x, y, 3 + Math.random() * 4, dripLen);
    // Drip end blob
    ctx.beginPath();
    ctx.arc(x + 2, y + dripLen, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  return new THREE.CanvasTexture(canvas);
}

  const windowColors = [0xfff9c4, 0xffe0b2, 0xbbdefb, 0xf8bbd0, 0xc8e6c9];

  const rows = Math.floor(bh / 2);
  const cols = Math.floor(bw / 1.5);
  
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.6) continue;
      const wc = windowColors[Math.floor(Math.random() * windowColors.length)];
      const wGeo = new THREE.PlaneGeometry(winSize, winSize * 1.3);
      const wMat = new THREE.MeshBasicMaterial({

        transparent: true,
        opacity: 0.7 + Math.random() * 0.3
      });

    }
  }

function createNeonSigns() {
  const signs = [
    { text: 'SPÄTI', color: 0xff2d95, x: -8, y: 5, z: -5 },
    { text: 'DÖNER', color: 0x00e5ff, x: 8, y: 4, z: -4 },
    { text: 'KIEZ', color: 0xffd700, x: -3, y: 7, z: -12 },
    { text: 'CLUB', color: 0x7c4dff, x: 5, y: 6, z: -10 },
    { text: 'BAR', color: 0x00e676, x: -10, y: 3.5, z: -3 },
    { text: 'OPEN', color: 0xff6b35, x: 12, y: 4.5, z: -6 }
  ];
  
  signs.forEach(s => {
    // Sign backing
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 80;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#' + new THREE.Color(s.color).getHexString();
    ctx.lineWidth = 4;
    const r = 12;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(256-r, 0); ctx.quadraticCurveTo(256, 0, 256, r);
    ctx.lineTo(256, 80-r); ctx.quadraticCurveTo(256, 80, 256-r, 80);
    ctx.lineTo(r, 80); ctx.quadraticCurveTo(0, 80, 0, 80-r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill(); ctx.stroke();
    
    ctx.font = 'bold 48px "Bangers", Impact, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#' + new THREE.Color(s.color).getHexString();
    ctx.shadowColor = '#' + new THREE.Color(s.color).getHexString();
    ctx.shadowBlur = 20;
    ctx.fillText(s.text, 128, 42);
    ctx.shadowBlur = 40;
    ctx.fillText(s.text, 128, 42);
    
    const tex = new THREE.CanvasTexture(canvas);
    const geo = new THREE.PlaneGeometry(3, 1);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(s.x, s.y, s.z);

    const glowLight = new THREE.PointLight(s.color, 1.5, 8);
    glowLight.position.set(s.x, s.y, s.z + 1);
    scene.add(glowLight);
    
    neonSigns.push({ mesh, light: glowLight, baseIntensity: 1.5, color: s.color });
  });
}

      ctx.beginPath();
      for (let j = 0; j < 5; j++) {

      ctx.beginPath();
      ctx.moveTo(10, 50); ctx.lineTo(10, 20); ctx.lineTo(20, 30);
      ctx.lineTo(32, 10); ctx.lineTo(44, 30); ctx.lineTo(54, 20);
      ctx.lineTo(54, 50); ctx.closePath(); ctx.fill();

// ===== PARTICLE SYSTEM =====
const activeParticles = [];

function spawnParticles(x, y, z, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const size = 0.05 + Math.random() * 0.12;
    const geo = new THREE.SphereGeometry(size, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x, y, z);
    
    const angle = Math.random() * Math.PI * 2;
    const upAngle = Math.random() * Math.PI * 0.5;
    const s = speed * (0.5 + Math.random());
    
    p.userData.vel = new THREE.Vector3(
      Math.cos(angle) * Math.sin(upAngle) * s,
      Math.cos(upAngle) * s + Math.random() * s * 0.5,
      Math.sin(angle) * Math.sin(upAngle) * s
    );
    p.userData.life = life;
    p.userData.maxLife = life;
    p.userData.gravity = -2 - Math.random() * 2;
    
    scene.add(p);
    activeParticles.push(p);
  }
}

function spawnBurstParticles(worldX, worldY, worldZ, colors, count) {
  colors.forEach(c => {
    spawnParticles(worldX, worldY, worldZ, c, Math.floor(count / colors.length), 3, 1.5);
  });
}

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.userData.life -= dt;
    
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      activeParticles.splice(i, 1);
      continue;
    }
    
    const vel = p.userData.vel;
    vel.y += p.userData.gravity * dt;
    p.position.add(vel.clone().multiplyScalar(dt));
    
    const lifeRatio = p.userData.life / p.userData.maxLife;
    p.material.opacity = lifeRatio;
    p.scale.setScalar(0.5 + lifeRatio * 0.5);
    
    if (p.position.y < 0) {
      p.position.y = 0;
      vel.y *= -0.3;
      vel.x *= 0.7;
      vel.z *= 0.7;
    }
  }
}

// ===== ANIMATION =====
let cameraAngle = 0;
let characterBob = 0;
let shakeAmount = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  
  // Camera orbit
  cameraAngle += dt * 0.08;
  const camR = 18;
  camera.position.x = Math.sin(cameraAngle) * camR * 0.3;
  camera.position.z = 15 + Math.cos(cameraAngle) * 3;
  camera.position.y = 7 + Math.sin(t * 0.3) * 0.5;
  camera.lookAt(0, 2, 0);
  
  // Screen shake
  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.9;
    if (shakeAmount < 0.01) shakeAmount = 0;
  }
  
  // Character animation
  if (character) {
    characterBob += dt * 3;
    character.position.y = Math.sin(characterBob) * 0.15;
    character.rotation.y = Math.sin(t * 0.5) * 0.3;
    
    // Idle breathing
    character.children.forEach((child, i) => {
      if (i === 0 || i === 1) { // body parts
        child.scale.x = 1 + Math.sin(t * 2) * 0.02;
        child.scale.z = 1 + Math.sin(t * 2) * 0.02;
      }
    });
  }
  
  // Neon signs flicker
  neonSigns.forEach((ns, i) => {
    const flicker = Math.sin(t * 3 + i * 2) * 0.3 + Math.sin(t * 7 + i * 5) * 0.2;
    ns.light.intensity = ns.baseIntensity + flicker;
    ns.mesh.material.opacity = 0.8 + flicker * 0.2;
  });
  
  // Ambient particles float
  ambientParticles.forEach(p => {
    const d = p.userData;
    p.position.y = d.baseY + Math.sin(t * d.speed + d.phase) * d.amplitude;
    p.position.x += d.driftX * dt;
    p.position.z += d.driftZ * dt;
    
    // Wrap around
    if (p.position.x > 20) p.position.x = -20;
    if (p.position.x < -20) p.position.x = 20;
    if (p.position.z > 15) p.position.z = -15;
    if (p.position.z < -15) p.position.z = 15;
    
    p.material.opacity = 0.3 + Math.sin(t * d.speed * 2 + d.phase) * 0.3;
  });
  
  // Trash bins subtle bounce
  trashBins.forEach((bin, i) => {
    bin.rotation.y = Math.sin(t * 0.5 + i) * 0.05;
  });
  
  updateParticles(dt);
  renderer.render(scene, camera);
}

// ===== UI EFFECTS =====
function flashScreen(type) {
  const flash = document.getElementById('screen-flash');
  flash.className = `flash-${type}`;
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 150);
}

function screenShake(amount) {
  shakeAmount = amount;
}

function showFloatingScore(text, color, x, y) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = text;
  el.style.color = color;
  el.style.left = (x || window.innerWidth / 2) + 'px';
  el.style.top = (y || window.innerHeight / 2) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function showEvent(text, type) {
  const log = document.getElementById('event-log');
  const el = document.createElement('div');
  el.className = `event-msg event-${type}`;
  el.textContent = text;
  log.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function updateHUD() {
  const stats = ['hunger', 'thirst', 'energy', 'health', 'money', 'street'];
  stats.forEach(s => {
    const val = Math.max(0, Math.min(100, state[s]));
    const bar = document.getElementById(`bar-${s}`);
    const txt = document.getElementById(`txt-${s}`);
    bar.style.width = val + '%';
    txt.textContent = s === 'money' ? val + '€' : val;
    
    // Pulse animation
    bar.classList.remove('pulse');
    void bar.offsetWidth;
    bar.classList.add('pulse');
    
    // Low warning
    if (val < 25 && s !== 'money' && s !== 'street') {
      bar.parentElement.style.animation = 'statPulse 0.5s ease-in-out infinite';
    } else {
      bar.parentElement.style.animation = '';
    }
  });
  
  const dayName = dayNames[(state.day - 1) % 7];
  const timeName = timeNames[state.timeOfDay];
  document.getElementById('day-display').textContent = `TAG ${state.day} - ${dayName} ${timeName}`;
}

// ===== GAMEPLAY =====
function advanceTime() {
  state.timeOfDay++;
  if (state.timeOfDay >= 4) {
    state.timeOfDay = 0;
    state.day++;
  }
  
  // Passive decay
  state.hunger = Math.max(0, state.hunger - (3 + Math.random() * 4));
  state.thirst = Math.max(0, state.thirst - (4 + Math.random() * 5));
  state.energy = Math.max(0, state.energy - (2 + Math.random() * 3));
  
  // Health damage from low stats
  if (state.hunger <= 0) { state.health -= 10; showEvent('☠️ Du verhungerst!', 'bad'); }
  if (state.thirst <= 0) { state.health -= 10; showEvent('☠️ Du verdurstest!', 'bad'); }
  if (state.energy <= 0) { state.health -= 5; showEvent('😵 Totale Erschöpfung!', 'bad'); }
  
  if (state.health <= 0) {
    state.health = 0;
    state.alive = false;
    gameOver();
  }
}

const actionCooldown = { active: false };

function doAction(action) {
  if (!state.alive || actionCooldown.active) return;
  
  actionCooldown.active = true;
  setTimeout(() => { actionCooldown.active = false; }, 600);
  
  state.actionCount++;
  const charPos = character ? character.position : { x: 0, y: 2, z: 5 };
  
  switch (action) {
    case 'eat': {
      if (state.money >= 5) {
        state.money -= 5;
        const gain = 20 + Math.floor(Math.random() * 20);
        state.hunger = Math.min(100, state.hunger + gain);
        state.energy = Math.min(100, state.energy + 5);
        
        const foods = ['🍕 Döner für 5€!', '🌮 Currywurst geholt!', '🥙 Falafel geschnappt!', '🍔 Burger gegönnt!'];
        showEvent(foods[Math.floor(Math.random() * foods.length)] + ` +${gain} Hunger`, 'good');
        flashScreen('good');
        showFloatingScore(`+${gain} 🍕`, '#ff2d95');
        spawnBurstParticles(charPos.x, 2.5, charPos.z, [0xff2d95, 0xff6b35, 0xffd700], 20);
        screenShake(0.2);
      } else {
        // Dumpster diving
        if (Math.random() > 0.4) {
          const gain = 10 + Math.floor(Math.random() * 10);
          state.hunger = Math.min(100, state.hunger + gain);
          state.health = Math.max(0, state.health - 3);
          showEvent(`🗑️ Mülltauchen... essbar! +${gain}`, 'neutral');
          spawnBurstParticles(charPos.x, 1.5, charPos.z, [0x00e5ff, 0x7c4dff], 10);
        } else {
          state.health -= 8;
          showEvent('🤮 Verdorbenes Essen! -8 HP', 'bad');
          flashScreen('bad');
          screenShake(0.5);
          spawnBurstParticles(charPos.x, 2, charPos.z, [0xff0044, 0xff2d95], 15);
        }
      }
      break;
    }
    
    case 'drink': {
      if (state.money >= 3) {
        state.money -= 3;
        const gain = 25 + Math.floor(Math.random() * 20);
        state.thirst = Math.min(100, state.thirst + gain);
        
        const drinks = ['🍺 Berliner Pilsner!', '💧 Sprudel vom Späti!', '☕ Club Mate!', '🥤 Fritz-Kola!'];
        showEvent(drinks[Math.floor(Math.random() * drinks.length)] + ` +${gain}`, 'good');
        flashScreen('good');
        showFloatingScore(`+${gain} 💧`, '#00e5ff');
        spawnBurstParticles(charPos.x, 2.5, charPos.z, [0x00e5ff, 0x00b4d8, 0xbbdefb], 20);
        screenShake(0.2);
      } else {
        const gain = 15;
        state.thirst = Math.min(100, state.thirst + gain);
        showEvent(`🚰 Leitungswasser... +${gain}`, 'neutral');
        spawnBurstParticles(charPos.x, 2, charPos.z, [0x00e5ff], 8);
      }
      break;
    }
    
    case 'sleep': {
      const gain = 30 + Math.floor(Math.random() * 20);
      state.energy = Math.min(100, state.energy + gain);
      state.health = Math.min(100, state.health + 5);
      state.hunger = Math.max(0, state.hunger - 10);
      state.thirst = Math.max(0, state.thirst - 10);
      
      const spots = ['🏚️ Hauseingang pennen', '🌳 Im Park geschlafen', '🚇 U-Bahn Nickerchen', '🏗️ Auf der Baustelle'];
      showEvent(spots[Math.floor(Math.random() * spots.length)] + ` +${gain}⚡`, 'neutral');
      showFloatingScore(`+${gain} ⚡`, '#ffd700');
      spawnBurstParticles(charPos.x, 3, charPos.z, [0x7c4dff, 0xb388ff, 0x651fff], 25);
      
      // Chance of getting robbed
      if (Math.random() > 0.7 && state.money > 0) {
        const lost = Math.floor(state.money * 0.3);
        state.money = Math.max(0, state.money - lost);
        showEvent(`💀 Im Schlaf beklaut! -${lost}€`, 'bad');
        flashScreen('bad');
        screenShake(0.6);
      }
      break;
    }
    
    case 'work': {
      if (state.energy < 20) {
        showEvent('😵 Zu müde zum Arbeiten!', 'bad');
        flashScreen('bad');
        screenShake(0.3);
        break;
      }
      
      state.energy = Math.max(0, state.energy - 25);
      state.hunger = Math.max(0, state.hunger - 10);
      state.thirst = Math.max(0, state.thirst - 10);
      
      const jobs = [
        { text: '🧹 Straßen gefegt', pay: 8 },
        { text: '📦 Pakete geschleppt', pay: 12 },
        { text: '🍽️ Teller gespült', pay: 10 },
        { text: '🚲 Lieferfahrer', pay: 15 },
        { text: '🎸 Straßenmusik', pay: 5 + Math.floor(Math.random() * 15) }
      ];
      const job = jobs[Math.floor(Math.random() * jobs.length)];
      state.money = Math.min(100, state.money + job.pay);
      state.street = Math.min(100, state.street + 2);
      
      showEvent(`${job.text} +${job.pay}€`, 'good');
      flashScreen('good');
      showFloatingScore(`+${job.pay}€ 💰`, '#7c4dff');
      spawnBurstParticles(charPos.x, 2.5, charPos.z, [0xffd700, 0xff9100, 0xffeb3b], 20);
      screenShake(0.15);
      break;
    }
    
    case 'explore': {
      state.energy = Math.max(0, state.energy - 10);
      state.street = Math.min(100, state.street + 5);
      
      const events = [
        { text: '🎨 Geile Graffiti-Wand entdeckt! +5 Street', type: 'good', street: 5 },
        { text: '👥 Neue Leute kennengelernt! +8 Street', type: 'good', street: 8 },
        { text: '💰 10€ auf der Straße gefunden!', type: 'epic', money: 10 },
        { text: '🎵 Straßenparty! +10 Energy', type: 'good', energy: 10 },
        { text: '🐕 Süßer Hund gestreichelt! +5 Health', type: 'good', health: 5 },
        { text: '🌆 Sonnenuntergang am Kanal. Schön.', type: 'neutral' },
        { text: '🏪 Geheimen Späti entdeckt!', type: 'epic', street: 10 },
        { text: '⚠️ Falsche Ecke... -5 Health', type: 'bad', health: -5 },
        { text: '🎪 Flohmarkt! Coole Sachen gesehen', type: 'neutral', street: 3 }
      ];
      
      const ev = events[Math.floor(Math.random() * events.length)];
      if (ev.money) state.money = Math.min(100, state.money + ev.money);
      if (ev.health) state.health = Math.min(100, Math.max(0, state.health + ev.health));
      if (ev.energy) state.energy = Math.min(100, state.energy + ev.energy);
      if (ev.street) state.street = Math.min(100, state.street + ev.street);
      
      showEvent(ev.text, ev.type);
      
      if (ev.type === 'epic') {
        flashScreen('epic');
        screenShake(0.4);
        showFloatingScore('EPIC!', '#ffd700');
        spawnBurstParticles(charPos.x, 3, charPos.z, [0xffd700, 0xff6b35, 0xff2d95, 0x00e5ff], 40);
      } else if (ev.type === 'good') {
        flashScreen('good');
        spawnBurstParticles(charPos.x, 2.5, charPos.z, [0x00e676, 0x69f0ae], 15);
      } else if (ev.type === 'bad') {
        flashScreen('bad');
        screenShake(0.4);
        spawnBurstParticles(charPos.x, 2, charPos.z, [0xff0044], 10);
      } else {
        spawnBurstParticles(charPos.x, 2, charPos.z, [0x00e5ff, 0x7c4dff], 10);
      }
      break;
    }
    
    case 'hustle': {
      state.energy = Math.max(0, state.energy - 15);
      
      const roll = Math.random();
      if (roll > 0.6) {
        const gain = 10 + Math.floor(Math.random() * 25);
        state.money = Math.min(100, state.money + gain);
        state.street = Math.min(100, state.street + 8);
        
        const hustles = [
          `🎲 Hütchenspiel gewonnen! +${gain}€`,
          `🤝 Deal abgezogen! +${gain}€`,
          `🎯 Wette gewonnen! +${gain}€`,
          `💎 Schnäppchen geflippt! +${gain}€`
        ];
        showEvent(hustles[Math.floor(Math.random() * hustles.length)], 'epic');
        flashScreen('epic');
        screenShake(0.3);
        showFloatingScore(`+${gain}€ 🎲`, '#ffd700');
        spawnBurstParticles(charPos.x, 3, charPos.z, [0xffd700, 0xff6b35, 0xff2d95, 0x7c4dff, 0x00e5ff], 35);
      } else if (roll > 0.3) {
        state.street = Math.min(100, state.street + 3);
        showEvent('🤷 Nix passiert. +3 Street Cred', 'neutral');
        spawnBurstParticles(charPos.x, 2, charPos.z, [0xff6b35], 8);
      } else {
        const loss = Math.floor(state.money * 0.4);
        state.money = Math.max(0, state.money - loss);
        state.health = Math.max(0, state.health - 10);
        
        const fails = [
          `👮 Bulle erwischt! -${loss}€ -10HP`,
          `💀 Abgezogen worden! -${loss}€ -10HP`,
          `🏃 Musste rennen! -${loss}€ -10HP`
        ];
        showEvent(fails[Math.floor(Math.random() * fails.length)], 'bad');
        flashScreen('bad');
        screenShake(0.7);
        spawnBurstParticles(charPos.x, 2, charPos.z, [0xff0044, 0xff2d95], 20);
      }
      break;
    }
  }
  
  advanceTime();
  updateHUD();
  
  // Milestone particles
  if (state.day % 7 === 0 && state.timeOfDay === 0) {
    showEvent(`👑 WOCHE ${Math.floor(state.day / 7)} ÜBERLEBT!`, 'epic');
    flashScreen('epic');
    screenShake(0.5);
    spawnBurstParticles(0, 4, 5, [0xffd700, 0xff2d95, 0x00e5ff, 0x00e676, 0x7c4dff, 0xff6b35], 60);
  }
  
  if (state.street >= 100 && !state.crowned) {
    state.crowned = true;
    showEvent('👑👑👑 DU BIST DER KIEZKÖNIG! 👑👑👑', 'epic');
    flashScreen('epic');
    screenShake(0.8);
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        spawnBurstParticles(
          (Math.random() - 0.5) * 10, 
          3 + Math.random() * 3, 
          5 + (Math.random() - 0.5) * 5,
          [0xffd700, 0xff2d95, 0x00e5ff, 0x00e676, 0x7c4dff, 0xff6b35], 30
        );
      }, i * 300);
    }
  }
}

function gameOver() {
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('actions').style.display = 'none';
  
  const statsDiv = document.getElementById('go-stats');
  statsDiv.innerHTML = `
    <p>Du hast <span>${state.day} Tage</span> überlebt</p>
    <p>Street Cred: <span>${state.street}/100</span></p>
    <p>Aktionen: <span>${state.actionCount}</span></p>
    <p>Geld: <span>${state.money}€</span></p>
    <p>${state.street >= 50 ? '👑 Respekt im Kiez verdient!' : '💀 Der Kiez hat dich geschluckt...'}</p>
  `;
  
  // Death particles
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      spawnBurstParticles(
        (Math.random() - 0.5) * 6,
        2 + Math.random() * 3,
        5,
        [0xff0044, 0xff2d95, 0x7c4dff], 15
      );
    }, i * 200);
  }
  screenShake(1.0);
}

function restartGame() {
  state.hunger = 70; state.thirst = 80; state.energy = 90;
  state.health = 100; state.money = 20; state.street = 10;
  state.day = 1; state.timeOfDay = 0;
  state.alive = true; state.actionCount = 0;
  state.crowned = false;
  
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('actions').style.display = 'block';
  updateHUD();
  
  flashScreen('epic');
  spawnBurstParticles(0, 3, 5, [0xffd700, 0x00e5ff, 0xff2d95, 0x00e676], 40);
}

// ===== START =====
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('actions').style.display = 'block';
  updateHUD();
  
  // Opening burst
  flashScreen('epic');
  showEvent('👑 Willkommen im Kiez! Überlebe!', 'epic');
  setTimeout(() => {
    spawnBurstParticles(0, 3, 5, [0xffd700, 0xff2d95, 0x00e5ff, 0x00e676, 0x7c4dff], 50);
    screenShake(0.3);
  }, 300);
}

document.getElementById('start-btn').addEventListener('click', startGame);

// Handle resize
window.addEventListener('resize', () => {
  if (camera && renderer) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});

// Init
initThree();
animate();
</script>
