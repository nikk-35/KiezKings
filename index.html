<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIEZKINGS - Berlin Street Survival</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            color: white;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        #stats-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #FF6B35;
            border-radius: 10px;
            padding: 10px;
            pointer-events: auto;
            min-width: 250px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .stat-bar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health { background: #e74c3c; }
        .hunger { background: #f39c12; }
        .warmth { background: #e67e22; }
        .energy { background: #3498db; }
        
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FF6B35;
        }
        
        #start-screen h1 {
            color: #FF6B35;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
        }
        
        #start-btn {
            background: linear-gradient(45deg, #FF6B35, #FF8C42);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            pointer-events: auto;
        }
        
        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #FF6B35;
            border-radius: 10px;
            padding: 12px 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
        }
        
        .control-btn:active {
            background: rgba(255, 107, 53, 0.3);
        }
        
        #money-display {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 10px;
            color: #f1c40f;
            font-weight: bold;
            pointer-events: auto;
        }
        
        #notification {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #FF6B35;
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            text-align: center;
            display: none;
            z-index: 300;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay">
        <div id="start-screen">
            <h1>KIEZKINGS</h1>
            <p>Berlin Street Survival</p>
            <button id="start-btn" onclick="startGame()">🎮 SPIEL STARTEN</button>
        </div>
        
        <div id="stats-panel" style="display: none;">
            <div class="stat-row">
                <span>❤️ Gesundheit:</span>
                <div class="stat-bar"><div class="stat-fill health" id="health-bar"></div></div>
                <span id="health-text">100</span>
            </div>
            <div class="stat-row">
                <span>🍞 Hunger:</span>
                <div class="stat-bar"><div class="stat-fill hunger" id="hunger-bar"></div></div>
                <span id="hunger-text">80</span>
            </div>
            <div class="stat-row">
                <span>🔥 Wärme:</span>
                <div class="stat-bar"><div class="stat-fill warmth" id="warmth-bar"></div></div>
                <span id="warmth-text">60</span>
            </div>
            <div class="stat-row">
                <span>⚡ Energie:</span>
                <div class="stat-bar"><div class="stat-fill energy" id="energy-bar"></div></div>
                <span id="energy-text">90</span>
            </div>
        </div>
        
        <div id="money-display" style="display: none;">
            💰 <span id="money-amount">2.50</span>€
        </div>
        
        <div id="controls">
            <button class="control-btn" onclick="doAction('search')">🗑️ Suchen</button>
            <button class="control-btn" onclick="doAction('rest')">😴 Ruhen</button>
            <button class="control-btn" onclick="doAction('beg')">🤲 Betteln</button>
            <button class="control-btn" onclick="doAction('work')">💼 Arbeiten</button>
        </div>
        
        <div id="notification">
            <p id="notification-text"></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            health: 100,
            hunger: 80,
            warmth: 60,
            energy: 90,
            money: 2.50,
            playing: false,
            timeOfDay: 'day' // day, evening, night, dawn
        };

        // 3D Scene Variables
        let scene, camera, renderer;
        let character, buildings = [], streetItems = [];
        
        // Initialize 3D Scene - MOBILE OPTIMIZED
        function init3D() {
            // Scene with BRIGHT background
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue instead of dark
            
            // NO FOG for performance
            // scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 8, 10);
            camera.lookAt(0, 0, 0);

            // Renderer - MOBILE OPTIMIZED
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false }); // No antialias for performance
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Cap pixel ratio
            
            // DISABLE SHADOWS for performance
            renderer.shadowMap.enabled = false;

            createSimpleWorld();
            createBrightLighting();
            createCharacter();
            
            animate();
        }

        function createSimpleWorld() {
            // Bright ground
            const groundGeometry = new THREE.PlaneGeometry(40, 40);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 }); // Light gray
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Simple colorful buildings - BRIGHT COLORS
            const buildingColors = [0x8B4513, 0x556B2F, 0x483D8B, 0x8B0000, 0x2F4F4F, 0x800080];
            
            for (let i = 0; i < 6; i++) {
                const buildingGeometry = new THREE.BoxGeometry(
                    3 + Math.random() * 2,
                    4 + Math.random() * 6,
                    3 + Math.random() * 2
                );
                const buildingMaterial = new THREE.MeshLambertMaterial({ 
                    color: buildingColors[i % buildingColors.length]
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                
                const angle = (i / 6) * Math.PI * 2;
                building.position.x = Math.cos(angle) * (12 + Math.random() * 3);
                building.position.z = Math.sin(angle) * (12 + Math.random() * 3);
                building.position.y = building.geometry.parameters.height / 2;
                
                buildings.push(building);
                scene.add(building);
            }

            // Street items - BRIGHT COLORS
            createStreetItems();
        }

        function createStreetItems() {
            // Colorful trash bins
            const trashColors = [0xFF6B35, 0x4ECDC4, 0x45B7D1, 0x96CEB4, 0xF7DC6F, 0xBB8FCE];
            
            for (let i = 0; i < 6; i++) {
                const trashGeometry = new THREE.CylinderGeometry(0.6, 0.8, 1.2, 8);
                const trashMaterial = new THREE.MeshLambertMaterial({ 
                    color: trashColors[i % trashColors.length] 
                });
                const trash = new THREE.Mesh(trashGeometry, trashMaterial);
                
                trash.position.x = (Math.random() - 0.5) * 25;
                trash.position.z = (Math.random() - 0.5) * 25;
                trash.position.y = 0.6;
                trash.userData = { type: 'trash', interactable: true };
                
                streetItems.push(trash);
                scene.add(trash);
            }

            // Bright bottles
            for (let i = 0; i < 8; i++) {
                const bottleGeometry = new THREE.CylinderGeometry(0.1, 0.15, 0.4, 8);
                const bottleMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x228B22 // Bright green
                });
                const bottle = new THREE.Mesh(bottleGeometry, bottleMaterial);
                
                bottle.position.x = (Math.random() - 0.5) * 30;
                bottle.position.z = (Math.random() - 0.5) * 30;
                bottle.position.y = 0.2;
                bottle.userData = { type: 'bottle', value: 0.25 };
                
                streetItems.push(bottle);
                scene.add(bottle);
            }
        }

        function createCharacter() {
            const characterGroup = new THREE.Group();
            
            // Bright colorful character
            const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 1, 8);
            const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xFF6B35 }); // Orange body
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1;
            characterGroup.add(body);
            
            // Head
            const headGeometry = new THREE.SphereGeometry(0.25, 8, 6);
            const headMaterial = new THREE.MeshLambertMaterial({ color: 0xFFDBB3 }); // Skin color
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.6;
            characterGroup.add(head);
            
            // Hat
            const hatGeometry = new THREE.CylinderGeometry(0.28, 0.28, 0.15, 8);
            const hatMaterial = new THREE.MeshLambertMaterial({ color: 0x2F4F4F }); // Dark gray hat
            const hat = new THREE.Mesh(hatGeometry, hatMaterial);
            hat.position.y = 1.75;
            characterGroup.add(hat);
            
            characterGroup.position.set(0, 0, 0);
            character = characterGroup;
            scene.add(character);
        }

        function createBrightLighting() {
            // VERY BRIGHT ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.8); // Much brighter
            scene.add(ambientLight);

            // BRIGHT directional light - NO SHADOWS
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(10, 15, 5);
            // directionalLight.castShadow = false; // Disabled for performance
            scene.add(directionalLight);

            // Additional lights for brightness
            const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
            light2.position.set(-10, 10, -5);
            scene.add(light2);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate camera around scene when not playing
            if (!gameState.playing) {
                const time = Date.now() * 0.0003;
                camera.position.x = Math.cos(time) * 15;
                camera.position.z = Math.sin(time) * 15;
                camera.lookAt(0, 0, 0);
            }
            
            // Simple character animation
            if (character) {
                character.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }

        function startGame() {
            gameState.playing = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('stats-panel').style.display = 'block';
            document.getElementById('money-display').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            
            // Stop camera rotation
            camera.position.set(10, 8, 10);
            camera.lookAt(0, 0, 0);
            
            updateUI();
            startGameLoop();
        }

        function doAction(action) {
            if (gameState.energy <= 10) {
                showNotification('Du bist zu müde! Ruhe dich aus!');
                return;
            }
            
            let message = '';
            
            switch(action) {
                case 'search':
                    gameState.energy -= 10;
                    if (Math.random() < 0.6) {
                        const found = Math.floor(Math.random() * 3) + 1;
                        gameState.money += found * 0.25;
                        message = `Du findest ${found} Pfandflaschen! (+${(found * 0.25).toFixed(2)}€)`;
                    } else {
                        gameState.health -= 10;
                        message = 'Autsch! Du schneidest dich an Scherben!';
                    }
                    break;
                    
                case 'rest':
                    gameState.energy = Math.min(100, gameState.energy + 20);
                    gameState.health = Math.min(100, gameState.health + 10);
                    gameState.warmth = Math.min(100, gameState.warmth + 15);
                    message = 'Du ruhst dich aus und fühlst dich besser.';
                    break;
                    
                case 'beg':
                    gameState.energy -= 8;
                    const earned = Math.random() < 0.4 ? Math.floor(Math.random() * 3) + 1 : 0;
                    if (earned > 0) {
                        gameState.money += earned;
                        message = `Ein netter Mensch gibt dir ${earned}€!`;
                    } else {
                        message = 'Die Leute ignorieren dich...';
                    }
                    break;
                    
                case 'work':
                    if (gameState.health < 30) {
                        message = 'Du bist zu schwach zum arbeiten!';
                    } else {
                        gameState.energy -= 15;
                        gameState.health -= 5;
                        const pay = Math.floor(Math.random() * 8) + 5;
                        gameState.money += pay;
                        message = `Du hilfst jemandem und verdienst ${pay}€!`;
                    }
                    break;
            }
            
            updateUI();
            showNotification(message);
            
            // Check game over
            if (gameState.health <= 0) {
                setTimeout(() => {
                    showNotification('GAME OVER! Du bist gestorben!');
                    setTimeout(() => location.reload(), 2000);
                }, 1000);
            }
        }

        function updateUI() {
            // Update stat bars
            document.getElementById('health-bar').style.width = gameState.health + '%';
            document.getElementById('health-text').textContent = gameState.health;
            
            document.getElementById('hunger-bar').style.width = gameState.hunger + '%';
            document.getElementById('hunger-text').textContent = gameState.hunger;
            
            document.getElementById('warmth-bar').style.width = gameState.warmth + '%';
            document.getElementById('warmth-text').textContent = gameState.warmth;
            
            document.getElementById('energy-bar').style.width = gameState.energy + '%';
            document.getElementById('energy-text').textContent = gameState.energy;
            
            document.getElementById('money-amount').textContent = gameState.money.toFixed(2);
        }

        function showNotification(text) {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = text;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function startGameLoop() {
            setInterval(() => {
                if (!gameState.playing) return;
                
                // Slow stat decay
                gameState.hunger = Math.max(0, gameState.hunger - 1);
                gameState.warmth = Math.max(0, gameState.warmth - 0.5);
                gameState.energy = Math.max(0, gameState.energy - 0.3);
                
                // Health decreases if hungry or cold
                if (gameState.hunger <= 20 || gameState.warmth <= 20) {
                    gameState.health = Math.max(0, gameState.health - 1);
                }
                
                updateUI();
                
                // Game over check
                if (gameState.health <= 0) {
                    gameState.playing = false;
                    showNotification('GAME OVER! Du bist gestorben!');
                    setTimeout(() => location.reload(), 3000);
                }
            }, 3000); // Every 3 seconds
        }

        // Touch controls for camera
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        function setupControls() {
            const canvas = document.getElementById('gameCanvas');
            
            canvas.addEventListener('touchstart', (e) => {
                if (!gameState.playing) return;
                isDragging = true;
                const touch = e.touches[0];
                previousMousePosition.x = touch.clientX;
                previousMousePosition.y = touch.clientY;
                e.preventDefault();
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!gameState.playing || !isDragging) return;
                
                const touch = e.touches[0];
                const deltaX = touch.clientX - previousMousePosition.x;

                // Simple horizontal camera rotation
                const angle = deltaX * 0.01;
                const currentRadius = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
                const currentAngle = Math.atan2(camera.position.z, camera.position.x) + angle;
                
                camera.position.x = Math.cos(currentAngle) * currentRadius;
                camera.position.z = Math.sin(currentAngle) * currentRadius;
                camera.lookAt(0, 0, 0);

                previousMousePosition.x = touch.clientX;
                previousMousePosition.y = touch.clientY;
                e.preventDefault();
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
            });
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize everything
        window.addEventListener('load', () => {
            init3D();
            setupControls();
        });
    </script>
</body>
</html>
