<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KIEZKINGS - Berlin Street Survival</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            touch-action: none;
            user-select: none;
        }
        canvas { width: 100vw; height: 100vh; display: block; }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #FF6B35;
            border-radius: 10px;
            padding: 10px;
            pointer-events: auto;
            min-width: 250px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .stat-bar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 10px;
        }
        
        .stat-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health { background: #e74c3c; }
        .hunger { background: #f39c12; }
        .warmth { background: #e67e22; }
        .energy { background: #3498db; }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 20px;
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #FF6B35;
            border-radius: 8px;
            color: white;
            padding: 12px 15px;
            font-size: 12px;
            cursor: pointer;
            min-width: 70px;
            text-align: center;
        }
        
        .control-btn:active {
            background: rgba(255, 107, 53, 0.3);
        }
        
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FF6B35;
        }
        
        #start-screen h1 {
            color: #FF6B35;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        #start-btn {
            background: linear-gradient(45deg, #FF6B35, #FF8C42);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #movement-joystick {
            position: absolute;
            bottom: 80px;
            left: 30px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            display: none;
        }
        
        .joystick-outer {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 107, 53, 0.5);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        .joystick-inner {
            width: 40%;
            height: 40%;
            background: #FF6B35;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }
        
        #instructions {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="start-screen">
            <h1>KIEZKINGS</h1>
            <p>Berlin Street Survival - First Person</p>
            <button id="start-btn" onclick="startGame()">🎮 SPIEL STARTEN</button>
        </div>
        
        <div id="stats" style="display: none;">
            <div class="stat-row">
                <span>❤️ Gesundheit:</span>
                <div class="stat-bar"><div class="stat-fill health" id="health-bar"></div></div>
                <span id="health-text">100</span>
            </div>
            <div class="stat-row">
                <span>🍞 Hunger:</span>
                <div class="stat-bar"><div class="stat-fill hunger" id="hunger-bar"></div></div>
                <span id="hunger-text">80</span>
            </div>
            <div class="stat-row">
                <span>🔥 Wärme:</span>
                <div class="stat-bar"><div class="stat-fill warmth" id="warmth-bar"></div></div>
                <span id="warmth-text">60</span>
            </div>
            <div class="stat-row">
                <span>⚡ Energie:</span>
                <div class="stat-bar"><div class="stat-fill energy" id="energy-bar"></div></div>
                <span id="energy-text">90</span>
            </div>
            <div class="stat-row">
                <span>💰 Geld:</span>
                <span id="money-text">2.50€</span>
            </div>
        </div>
        
        <div id="crosshair">+</div>
        
        <div id="movement-joystick">
            <div class="joystick-outer">
                <div class="joystick-inner"></div>
            </div>
        </div>
        
        <div id="controls" style="display: none;">
            <button class="control-btn" onclick="doAction('search')">🗑️ Suchen</button>
            <button class="control-btn" onclick="doAction('rest')">😴 Ruhen</button>
            <button class="control-btn" onclick="doAction('beg')">🤲 Betteln</button>
        </div>
        
        <div id="instructions" style="display: none;">
            <div>HANDY: Drag anywhere to look around • Joystick to move</div>
            <div>DESKTOP: WASD to move • Mouse to look around</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            health: 100,
            hunger: 80,
            warmth: 60,
            energy: 90,
            money: 2.50,
            playing: false
        };

        // 3D Scene Variables
        let scene, camera, renderer;
        let buildings = [], streetItems = [];
        
        // Camera controls - FIXED FOR MOBILE
        let yaw = 0, pitch = 0;
        const mouseSensitivity = 0.002;
        const touchSensitivity = 0.004; // Higher sensitivity for touch
        let isPointerLocked = false;
        
        // Movement
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const moveSpeed = 0.1;
        const position = new THREE.Vector3(0, 1.7, 5);
        
        // Mobile controls
        let isTouchLooking = false;
        let lastTouchX = 0, lastTouchY = 0;
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        
        function init3D() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(position);

            // Renderer
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

            createWorld();
            createLighting();
            setupControls();
            animate();
        }

        function createWorld() {
            // Ground
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Simple buildings
            const buildingColors = [0x8B4513, 0x556B2F, 0x483D8B, 0x8B0000, 0x2F4F4F, 0x800080];
            
            for (let i = 0; i < 8; i++) {
                const buildingGeometry = new THREE.BoxGeometry(
                    4 + Math.random() * 3,
                    6 + Math.random() * 8,
                    4 + Math.random() * 3
                );
                const buildingMaterial = new THREE.MeshLambertMaterial({ 
                    color: buildingColors[i % buildingColors.length]
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                
                // Position buildings in a grid around the player
                const angle = (i / 8) * Math.PI * 2;
                building.position.x = Math.cos(angle) * (15 + Math.random() * 10);
                building.position.z = Math.sin(angle) * (15 + Math.random() * 10);
                building.position.y = building.geometry.parameters.height / 2;
                
                buildings.push(building);
                scene.add(building);
            }

            // Street items
            const trashColors = [0xFF6B35, 0x4ECDC4, 0x45B7D1, 0x96CEB4];
            
            for (let i = 0; i < 6; i++) {
                const trashGeometry = new THREE.CylinderGeometry(0.6, 0.8, 1.2, 8);
                const trashMaterial = new THREE.MeshLambertMaterial({ 
                    color: trashColors[i % trashColors.length]
                });
                const trash = new THREE.Mesh(trashGeometry, trashMaterial);
                
                trash.position.x = (Math.random() - 0.5) * 30;
                trash.position.z = (Math.random() - 0.5) * 30;
                trash.position.y = 0.6;
                
                streetItems.push(trash);
                scene.add(trash);
            }
        }

        function createLighting() {
            // Bright ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.8);
            scene.add(ambientLight);

            // Directional light
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 15, 5);
            scene.add(directionalLight);
        }

        function setupControls() {
            const canvas = document.getElementById('gameCanvas');
            
            // Desktop mouse controls
            canvas.addEventListener('click', () => {
                if (!isPointerLocked) {
                    canvas.requestPointerLock();
                }
            });

            document.addEventListener('pointerlockchange', () => {
                isPointerLocked = document.pointerLockElement === canvas;
            });

            document.addEventListener('mousemove', (event) => {
                if (isPointerLocked) {
                    yaw -= event.movementX * mouseSensitivity;
                    pitch -= event.movementY * mouseSensitivity;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                }
            });

            // MOBILE TOUCH CONTROLS - FIXED VERSION
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                
                if (e.touches.length === 1) {
                    isTouchLooking = true;
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                
                if (isTouchLooking && e.touches.length === 1) {
                    const deltaX = e.touches[0].clientX - lastTouchX;
                    const deltaY = e.touches[0].clientY - lastTouchY;
                    
                    // Apply rotation - FIXED SENSITIVITY
                    yaw -= deltaX * touchSensitivity;
                    pitch -= deltaY * touchSensitivity;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                    
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                isTouchLooking = false;
            }, { passive: false });

            // Keyboard controls
            document.addEventListener('keydown', (event) => {
                switch(event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            });

            document.addEventListener('keyup', (event) => {
                switch(event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            // Mobile joystick
            setupJoystick();
        }

        function setupJoystick() {
            const joystick = document.getElementById('movement-joystick');
            const outer = joystick.querySelector('.joystick-outer');
            const inner = joystick.querySelector('.joystick-inner');
            
            let startX = 0, startY = 0;
            
            joystick.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystickActive = true;
                const rect = outer.getBoundingClientRect();
                startX = rect.left + rect.width / 2;
                startY = rect.top + rect.height / 2;
            });
            
            joystick.addEventListener('touchmove', (e) => {
                if (!joystickActive) return;
                e.preventDefault();
                
                const touch = e.touches[0];
                const deltaX = touch.clientX - startX;
                const deltaY = touch.clientY - startY;
                
                const distance = Math.min(50, Math.sqrt(deltaX * deltaX + deltaY * deltaY));
                const angle = Math.atan2(deltaY, deltaX);
                
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                inner.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                
                joystickVector.x = x / 50;
                joystickVector.y = y / 50;
            });
            
            joystick.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                inner.style.transform = 'translate(-50%, -50%)';
                joystickVector.x = 0;
                joystickVector.y = 0;
            });
        }

        function updateMovement() {
            const direction = new THREE.Vector3();
            const right = new THREE.Vector3();
            
            // Calculate movement direction
            camera.getWorldDirection(direction);
            right.crossVectors(camera.up, direction).normalize();
            
            const moveVector = new THREE.Vector3();
            
            // Desktop movement
            if (moveForward) moveVector.add(direction);
            if (moveBackward) moveVector.sub(direction);
            if (moveLeft) moveVector.add(right);
            if (moveRight) moveVector.sub(right);
            
            // Mobile joystick movement
            if (joystickActive) {
                moveVector.add(direction.clone().multiplyScalar(-joystickVector.y));
                moveVector.add(right.clone().multiplyScalar(-joystickVector.x));
            }
            
            // Apply movement
            if (moveVector.length() > 0) {
                moveVector.normalize().multiplyScalar(moveSpeed);
                position.add(moveVector);
            }
            
            // Update camera position and rotation
            camera.position.copy(position);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gameState.playing) {
                updateMovement();
            }
            
            renderer.render(scene, camera);
        }

        function startGame() {
            gameState.playing = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('stats').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('instructions').style.display = 'block';
            
            // Show mobile joystick on touch devices
            if ('ontouchstart' in window) {
                document.getElementById('movement-joystick').style.display = 'block';
            }
            
            updateUI();
        }

        function doAction(action) {
            if (gameState.energy <= 10) {
                alert('Du bist zu müde!');
                return;
            }
            
            let message = '';
            
            switch(action) {
                case 'search':
                    gameState.energy -= 10;
                    if (Math.random() < 0.6) {
                        const found = Math.floor(Math.random() * 3) + 1;
                        gameState.money += found * 0.25;
                        message = `Du findest ${found} Pfandflaschen! (+${(found * 0.25).toFixed(2)}€)`;
                    } else {
                        gameState.health -= 10;
                        message = 'Du schneidest dich an Scherben!';
                    }
                    break;
                    
                case 'rest':
                    gameState.energy = Math.min(100, gameState.energy + 30);
                    gameState.health = Math.min(100, gameState.health + 10);
                    message = 'Du ruhst dich aus.';
                    break;
                    
                case 'beg':
                    gameState.energy -= 8;
                    const earned = Math.random() < 0.4 ? Math.floor(Math.random() * 3) + 1 : 0;
                    if (earned > 0) {
                        gameState.money += earned;
                        message = `Jemand gibt dir ${earned}€!`;
                    } else {
                        message = 'Niemand gibt dir Geld.';
                    }
                    break;
            }
            
            updateUI();
            if (message) alert(message);
        }

        function updateUI() {
            document.getElementById('health-bar').style.width = gameState.health + '%';
            document.getElementById('health-text').textContent = gameState.health;
            
            document.getElementById('hunger-bar').style.width = gameState.hunger + '%';
            document.getElementById('hunger-text').textContent = gameState.hunger;
            
            document.getElementById('warmth-bar').style.width = gameState.warmth + '%';
            document.getElementById('warmth-text').textContent = gameState.warmth;
            
            document.getElementById('energy-bar').style.width = gameState.energy + '%';
            document.getElementById('energy-text').textContent = gameState.energy;
            
            document.getElementById('money-text').textContent = gameState.money.toFixed(2) + '€';
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        window.addEventListener('load', () => {
            init3D();
        });
    </script>
</body>
</html>
