<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KIEZKINGS — Berliner Straßen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace;
  touch-action: none; -webkit-touch-callout: none; user-select: none;
}
canvas { display: block; }
#loading {
  position: fixed; inset: 0; background: #0a0a0a; z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #888; font-size: 14px; letter-spacing: 2px;
}
#loading h1 { 
  font-size: 48px; color: #c4a35a; letter-spacing: 8px; margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(196,163,90,0.3);
}
#loading .sub { color: #555; font-size: 12px; margin-bottom: 40px; }
#load-bar { width: 300px; height: 2px; background: #222; position: relative; }
#load-fill { height: 100%; background: #c4a35a; width: 0%; transition: width 0.3s; }
#load-text { margin-top: 16px; color: #444; font-size: 11px; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; padding: 12px 16px;
  display: none; z-index: 100; pointer-events: none;
}
#stats {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat {
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 12px; font-size: 11px; color: #aaa;
  backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px;
}
.stat-bar { width: 60px; height: 4px; background: #222; position: relative; }
.stat-fill { height: 100%; transition: width 0.5s; }
.stat-val { color: #c4a35a; font-size: 10px; min-width: 28px; text-align: right; }

#money-display {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(196,163,90,0.2);
  padding: 8px 16px; font-size: 16px; color: #c4a35a;
  backdrop-filter: blur(8px); display: none;
}

#interact-prompt {
  position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 24px; font-size: 13px; color: #ddd;
  backdrop-filter: blur(8px); display: none; z-index: 100;
  text-align: center; white-space: nowrap;
}

#dialog-box {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  width: min(500px, 90vw); background: rgba(10,10,10,0.92);
  border: 1px solid rgba(255,255,255,0.1); padding: 20px;
  display: none; z-index: 200; backdrop-filter: blur(12px);
}
#dialog-text { color: #ccc; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
#dialog-speaker { color: #c4a35a; font-size: 11px; margin-bottom: 8px; letter-spacing: 1px; }
#dialog-choices { display: flex; flex-direction: column; gap: 6px; }
.dialog-choice {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  padding: 8px 14px; color: #aaa; font-size: 12px; cursor: pointer;
  font-family: 'Courier New', monospace; text-align: left;
  pointer-events: all;
}
.dialog-choice:hover { background: rgba(196,163,90,0.1); color: #c4a35a; border-color: rgba(196,163,90,0.3); }

#notification {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); border: 1px solid rgba(196,163,90,0.3);
  padding: 8px 20px; font-size: 12px; color: #c4a35a;
  display: none; z-index: 150; backdrop-filter: blur(8px);
  transition: opacity 0.5s;
}

#minimap {
  position: fixed; bottom: 16px; right: 16px; width: 120px; height: 120px;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
  display: none; z-index: 100;
}

#touch-controls {
  position: fixed; bottom: 0; left: 0; right: 0; height: 160px;
  display: none; z-index: 100; pointer-events: none;
}
#joystick-area {
  position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px;
  pointer-events: all; touch-action: none;
}
#joystick-base {
  width: 100%; height: 100%; border-radius: 50%;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  position: relative;
}
#joystick-knob {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(196,163,90,0.3); border: 1px solid rgba(196,163,90,0.5);
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
}
#action-btn {
  position: absolute; bottom: 40px; right: 40px; width: 60px; height: 60px;
  border-radius: 50%; background: rgba(196,163,90,0.15);
  border: 1px solid rgba(196,163,90,0.4); pointer-events: all;
  display: flex; align-items: center; justify-content: center;
  color: #c4a35a; font-size: 11px; letter-spacing: 1px;
}

#time-display {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  color: #666; font-size: 11px; z-index: 100; display: none;
  letter-spacing: 2px;
}

#title-screen {
  position: fixed; inset: 0; z-index: 500; display: none;
  background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center;
}
#title-screen h1 {
  font-size: 56px; color: #c4a35a; letter-spacing: 12px;
  text-shadow: 0 0 40px rgba(196,163,90,0.2);
}
#title-screen .tagline { color: #444; font-size: 13px; margin-top: 8px; letter-spacing: 3px; }
#title-screen .start-btn {
  margin-top: 60px; padding: 12px 40px; background: transparent;
  border: 1px solid rgba(196,163,90,0.3); color: #c4a35a;
  font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer;
  letter-spacing: 3px; transition: all 0.3s;
}
#title-screen .start-btn:hover {
  background: rgba(196,163,90,0.1); border-color: rgba(196,163,90,0.6);
}
#title-screen .controls-info {
  margin-top: 40px; color: #333; font-size: 11px; text-align: center; line-height: 1.8;
}
</style>
</head>
<body>

<div id="loading">
  <h1>KIEZKINGS</h1>
  <div class="sub">BERLINER STRASSEN</div>
  <div id="load-bar"><div id="load-fill"></div></div>
  <div id="load-text">Lade Texturen...</div>
</div>

<div id="title-screen">
  <h1>KIEZKINGS</h1>
  <div class="tagline">ÜBERLEBEN AUF BERLINER STRASSEN</div>
  <button class="start-btn" onclick="startGame()">SPIELEN</button>
  <div class="controls-info">
    WASD / Pfeiltasten — Bewegen<br>
    Maus — Umsehen<br>
    E / Tippen — Interagieren<br>
    TAB — Inventar
  </div>
</div>

<div id="hud">
  <div id="stats">
    <div class="stat">
      <span>❤️</span>
      <div class="stat-bar"><div class="stat-fill" id="health-bar" style="width:100%;background:#8b3a3a"></div></div>
      <span class="stat-val" id="health-val">100</span>
    </div>
    <div class="stat">
      <span>🍞</span>
      <div class="stat-bar"><div class="stat-fill" id="hunger-bar" style="width:80%;background:#8b6914"></div></div>
      <span class="stat-val" id="hunger-val">80</span>
    </div>
    <div class="stat">
      <span>🔥</span>
      <div class="stat-bar"><div class="stat-fill" id="warmth-bar" style="width:70%;background:#c4a35a"></div></div>
      <span class="stat-val" id="warmth-val">70</span>
    </div>
    <div class="stat">
      <span>⚡</span>
      <div class="stat-bar"><div class="stat-fill" id="energy-bar" style="width:90%;background:#4a7a8b"></div></div>
      <span class="stat-val" id="energy-val">90</span>
    </div>
  </div>
</div>

<div id="money-display">€ <span id="money-val">2.50</span></div>
<div id="time-display"><span id="time-val">18:30</span> — <span id="day-val">Tag 1</span></div>
<div id="interact-prompt">[E] Interagieren</div>
<div id="notification"></div>

<div id="dialog-box">
  <div id="dialog-speaker"></div>
  <div id="dialog-text"></div>
  <div id="dialog-choices"></div>
</div>

<div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>

<div id="touch-controls">
  <div id="joystick-area">
    <div id="joystick-base"><div id="joystick-knob"></div></div>
  </div>
  <div id="action-btn">AKT</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// TEXTURE FACTORY — Procedural PBR textures via Canvas
// ============================================================
const TEX = {
  canvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return { c, x: c.getContext('2d') };
  },

  noise(x, w, h, intensity = 30) {
    const d = x.getImageData(0, 0, w, h);
    for (let i = 0; i < d.data.length; i += 4) {
      const n = (Math.random() - 0.5) * intensity;
      d.data[i] += n; d.data[i+1] += n; d.data[i+2] += n;
    }
    x.putImageData(d, 0, 0);
  },

  stain(x, w, h, count = 5) {
    for (let i = 0; i < count; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const r = 10 + Math.random() * 40;
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `rgba(0,0,0,${0.02 + Math.random() * 0.06})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = g; x.fillRect(cx - r, cy - r, r * 2, r * 2);
    }
  },

  crack(x, w, h, count = 3) {
    for (let i = 0; i < count; i++) {
      x.beginPath();
      x.strokeStyle = `rgba(0,0,0,${0.1 + Math.random() * 0.15})`;
      x.lineWidth = 0.5 + Math.random();
      let px = Math.random() * w, py = Math.random() * h;
      x.moveTo(px, py);
      const segs = 5 + Math.floor(Math.random() * 10);
      for (let s = 0; s < segs; s++) {
        px += (Math.random() - 0.5) * 30;
        py += Math.random() * 15;
        x.lineTo(px, py);
      }
      x.stroke();
    }
  },

  // Realistic weathered brick
  brick(size = 512) {
    const { c, x } = this.canvas(size, size);
    // Base mortar
    x.fillStyle = '#6b635a';
    x.fillRect(0, 0, size, size);
    this.noise(x, size, size, 15);
    
    const bw = size / 4, bh = size / 8;
    const mortarW = 3;
    const colors = ['#8b4535','#7a3d30','#6d3528','#945040','#7e4438','#6a3022','#8a5545','#704030'];
    
    for (let row = 0; row < 8; row++) {
      const offset = (row % 2) * (bw / 2);
      for (let col = -1; col < 5; col++) {
        const bx = col * bw + offset + mortarW;
        const by = row * bh + mortarW;
        const w = bw - mortarW * 2;
        const h = bh - mortarW * 2;
        
        const baseColor = colors[Math.floor(Math.random() * colors.length)];
        x.fillStyle = baseColor;
        x.fillRect(bx, by, w, h);
        
        // Brick texture variation
        for (let p = 0; p < 8; p++) {
          const px = bx + Math.random() * w;
          const py = by + Math.random() * h;
          const pr = 2 + Math.random() * 6;
          const g = x.createRadialGradient(px, py, 0, px, py, pr);
          const v = Math.random() > 0.5 ? 20 : -20;
          g.addColorStop(0, `rgba(${v > 0 ? '255,200,150' : '0,0,0'},${0.05 + Math.random() * 0.08})`);
          g.addColorStop(1, 'rgba(0,0,0,0)');
          x.fillStyle = g; x.fillRect(px - pr, py - pr, pr * 2, pr * 2);
        }
        
        // Weathering on edges
        if (Math.random() > 0.6) {
          x.fillStyle = `rgba(0,0,0,${0.05 + Math.random() * 0.1})`;
          x.fillRect(bx, by + h - 3, w, 3);
        }
        if (Math.random() > 0.7) {
          x.fillStyle = `rgba(80,70,60,${0.1 + Math.random() * 0.1})`;
          x.fillRect(bx, by, w, 2);
        }
      }
    }
    
    this.stain(x, size, size, 8);
    this.noise(x, size, size, 8);
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Concrete with realistic aging
  concrete(size = 512) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#8a8580';
    x.fillRect(0, 0, size, size);
    
    // Aggregate texture
    for (let i = 0; i < 200; i++) {
      const px = Math.random() * size, py = Math.random() * size;
      const r = 1 + Math.random() * 3;
      x.fillStyle = `rgba(${120 + Math.random()*40},${115 + Math.random()*40},${110 + Math.random()*40},${0.3 + Math.random()*0.4})`;
      x.beginPath(); x.arc(px, py, r, 0, Math.PI * 2); x.fill();
    }
    
    this.crack(x, size, size, 6);
    this.stain(x, size, size, 12);
    this.noise(x, size, size, 12);
    
    // Water stain streaks
    for (let i = 0; i < 3; i++) {
      const sx = Math.random() * size;
      x.fillStyle = `rgba(60,55,50,${0.03 + Math.random() * 0.04})`;
      x.fillRect(sx, 0, 2 + Math.random() * 8, size);
    }
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Wet asphalt
  asphalt(size = 512) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#2a2826';
    x.fillRect(0, 0, size, size);
    
    // Aggregate
    for (let i = 0; i < 500; i++) {
      const px = Math.random() * size, py = Math.random() * size;
      x.fillStyle = `rgba(${30 + Math.random()*30},${28 + Math.random()*28},${25 + Math.random()*25},${0.4 + Math.random()*0.5})`;
      x.fillRect(px, py, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }
    
    this.crack(x, size, size, 4);
    
    // Wet patches
    for (let i = 0; i < 4; i++) {
      const cx = Math.random() * size, cy = Math.random() * size;
      const r = 20 + Math.random() * 60;
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, 'rgba(50,48,45,0.15)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = g;
      x.fillRect(cx - r, cy - r, r * 2, r * 2);
    }
    
    // Tire marks
    if (Math.random() > 0.5) {
      x.strokeStyle = 'rgba(20,18,15,0.12)';
      x.lineWidth = 8;
      x.beginPath();
      x.moveTo(0, size * 0.4);
      x.bezierCurveTo(size * 0.3, size * 0.38, size * 0.7, size * 0.42, size, size * 0.4);
      x.stroke();
    }
    
    this.noise(x, size, size, 6);
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Sidewalk pavement  
  sidewalk(size = 512) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#7a7570';
    x.fillRect(0, 0, size, size);
    
    // Paving slabs
    const slabSize = size / 4;
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 4; col++) {
        const sx = col * slabSize + 1, sy = row * slabSize + 1;
        const sw = slabSize - 2, sh = slabSize - 2;
        const brightness = 110 + Math.floor(Math.random() * 20);
        x.fillStyle = `rgb(${brightness},${brightness-3},${brightness-6})`;
        x.fillRect(sx, sy, sw, sh);
        
        // Edge wear
        x.fillStyle = `rgba(0,0,0,${0.03 + Math.random() * 0.05})`;
        x.fillRect(sx, sy + sh - 2, sw, 2);
        x.fillRect(sx + sw - 2, sy, 2, sh);
      }
    }
    
    // Gum spots
    for (let i = 0; i < 5; i++) {
      x.fillStyle = `rgba(40,35,30,${0.15 + Math.random() * 0.15})`;
      x.beginPath();
      x.arc(Math.random() * size, Math.random() * size, 2 + Math.random() * 4, 0, Math.PI * 2);
      x.fill();
    }
    
    this.stain(x, size, size, 6);
    this.noise(x, size, size, 8);
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Window glass
  glass(size = 256) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#1a2530';
    x.fillRect(0, 0, size, size);
    
    // Interior glow hint
    const g = x.createRadialGradient(size*0.5, size*0.5, 0, size*0.5, size*0.5, size*0.5);
    g.addColorStop(0, 'rgba(180,150,100,0.15)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = g;
    x.fillRect(0, 0, size, size);
    
    // Curtain/blind lines
    if (Math.random() > 0.4) {
      x.strokeStyle = 'rgba(100,80,60,0.08)';
      x.lineWidth = 1;
      for (let y = 0; y < size; y += 8) {
        x.beginPath(); x.moveTo(0, y); x.lineTo(size, y); x.stroke();
      }
    }
    
    const tex = new THREE.CanvasTexture(c);
    return tex;
  },

  // Graffiti overlay
  graffiti(size = 512) {
    const { c, x } = this.canvas(size, size);
    x.clearRect(0, 0, size, size);
    
    const tags = ['FCK NZS','ACAB','1312','ANTIFA','BLN','XBERG','36',
                  'A.C.A.B.','REFUGEES WELCOME','KEIN MENSCH IST ILLEGAL',
                  'FIGHT RACISM','NO NAZIS','R.I.P.','KIEZ','VIVA'];
    const fonts = ['bold 28px Arial','italic 24px Impact','32px Georgia','bold 20px Courier'];
    const colors = ['rgba(200,30,30,0.7)','rgba(30,30,30,0.8)','rgba(255,255,255,0.6)',
                    'rgba(50,80,180,0.6)','rgba(180,160,30,0.5)'];
    
    // Random tags
    const numTags = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < numTags; i++) {
      x.save();
      const tag = tags[Math.floor(Math.random() * tags.length)];
      x.font = fonts[Math.floor(Math.random() * fonts.length)];
      x.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      const tx = 20 + Math.random() * (size - 150);
      const ty = 40 + Math.random() * (size - 80);
      x.translate(tx, ty);
      x.rotate((Math.random() - 0.5) * 0.3);
      x.fillText(tag, 0, 0);
      x.restore();
    }
    
    // Spray drips
    for (let i = 0; i < 15; i++) {
      const dx = Math.random() * size;
      const dy = Math.random() * size * 0.7;
      const dh = 10 + Math.random() * 30;
      x.fillStyle = `rgba(${Math.random() > 0.5 ? '200,30,30' : '30,30,30'},${0.1 + Math.random() * 0.15})`;
      x.fillRect(dx, dy, 1 + Math.random(), dh);
    }
    
    // Throw-up outlines
    if (Math.random() > 0.5) {
      x.strokeStyle = 'rgba(30,30,30,0.4)';
      x.lineWidth = 3;
      x.font = 'bold 60px Impact';
      const throwUp = ['BLN','KRZ','FCK','AFA'][Math.floor(Math.random()*4)];
      x.strokeText(throwUp, 30 + Math.random() * 200, 100 + Math.random() * 300);
    }
    
    const tex = new THREE.CanvasTexture(c);
    tex.premultiplyAlpha = true;
    return tex;
  },

  // Rusty metal
  metal(size = 256) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#5a5550';
    x.fillRect(0, 0, size, size);
    
    // Brushed metal lines
    for (let y = 0; y < size; y += 2) {
      x.strokeStyle = `rgba(${70+Math.random()*20},${65+Math.random()*20},${60+Math.random()*20},0.3)`;
      x.lineWidth = 0.5;
      x.beginPath(); x.moveTo(0, y); x.lineTo(size, y + (Math.random()-0.5)*2); x.stroke();
    }
    
    // Rust patches
    for (let i = 0; i < 6; i++) {
      const rx = Math.random() * size, ry = Math.random() * size;
      const rr = 10 + Math.random() * 30;
      const g = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
      g.addColorStop(0, `rgba(${130+Math.random()*40},${60+Math.random()*30},${20+Math.random()*20},${0.3+Math.random()*0.3})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = g; x.fillRect(rx-rr, ry-rr, rr*2, rr*2);
    }
    
    this.noise(x, size, size, 10);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Wood texture
  wood(size = 256) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = '#5a4030';
    x.fillRect(0, 0, size, size);
    
    for (let y = 0; y < size; y += 3) {
      const v = Math.random() * 15;
      x.fillStyle = `rgba(${80+v},${55+v},${35+v},0.4)`;
      x.fillRect(0, y, size, 2);
    }
    
    this.noise(x, size, size, 8);
    this.stain(x, size, size, 4);
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Plaster / Putz for Altbau
  plaster(baseR, baseG, baseB, size = 512) {
    const { c, x } = this.canvas(size, size);
    x.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
    x.fillRect(0, 0, size, size);
    
    // Fine texture
    for (let i = 0; i < 800; i++) {
      const px = Math.random() * size, py = Math.random() * size;
      const v = (Math.random() - 0.5) * 20;
      x.fillStyle = `rgba(${Math.max(0,baseR+v)},${Math.max(0,baseG+v)},${Math.max(0,baseB+v)},0.3)`;
      x.fillRect(px, py, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }
    
    // Paint peeling patches
    for (let i = 0; i < 4; i++) {
      const px = Math.random() * size, py = Math.random() * size;
      const pr = 15 + Math.random() * 40;
      const g = x.createRadialGradient(px, py, 0, px, py, pr);
      g.addColorStop(0, `rgba(${baseR-30},${baseG-30},${baseB-30},${0.1+Math.random()*0.15})`);
      g.addColorStop(0.7, `rgba(${baseR-15},${baseG-15},${baseB-15},0.05)`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = g; x.fillRect(px-pr, py-pr, pr*2, pr*2);
    }
    
    // Water damage streaks from top
    for (let i = 0; i < 2; i++) {
      const sx = Math.random() * size;
      x.fillStyle = `rgba(${Math.max(0,baseR-40)},${Math.max(0,baseG-40)},${Math.max(0,baseB-30)},${0.05+Math.random()*0.06})`;
      const w = 3 + Math.random() * 8;
      x.fillRect(sx, 0, w, size * (0.3 + Math.random() * 0.7));
    }
    
    this.noise(x, size, size, 6);
    this.crack(x, size, size, 2);
    
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  },

  // Späti / shop front sign
  shopSign(text, w = 512, h = 128) {
    const { c, x } = this.canvas(w, h);
    x.fillStyle = '#1a1a18';
    x.fillRect(0, 0, w, h);
    
    // Aged sign background
    x.fillStyle = '#2a2520';
    x.fillRect(4, 4, w - 8, h - 8);
    
    // Text
    x.font = 'bold 36px Arial';
    x.fillStyle = '#c8b070';
    x.textAlign = 'center';
    x.textBaseline = 'middle';
    x.fillText(text, w/2, h/2);
    
    this.noise(x, w, h, 10);
    this.stain(x, w, h, 3);
    
    return new THREE.CanvasTexture(c);
  },

  // Street sign
  streetSign(text, w = 300, h = 80) {
    const { c, x } = this.canvas(w, h);
    // Berlin street sign: white text on dark blue with white border
    x.fillStyle = '#1a3050';
    x.fillRect(0, 0, w, h);
    x.strokeStyle = '#e0e0e0';
    x.lineWidth = 3;
    x.strokeRect(3, 3, w - 6, h - 6);
    
    x.font = 'bold 24px Arial';
    x.fillStyle = '#e8e8e8';
    x.textAlign = 'center';
    x.textBaseline = 'middle';
    x.fillText(text, w / 2, h / 2);
    
    this.noise(x, w, h, 5);
    return new THREE.CanvasTexture(c);
  }
};

// BUILDING GENERATOR — Altbau Style
// ============================================================
function createAltbau(x, z, width, depth, floors, facadeMat, side) {
  const group = new THREE.Group();
  const floorH = 3.2;
  const totalH = floors * floorH + 1.5; // +roof parapet
  
  // Main facade
  const facadeGeo = new THREE.BoxGeometry(width, totalH, depth);
  const facade = new THREE.Mesh(facadeGeo, facadeMat);
  facade.position.set(0, totalH / 2, 0);
  facade.castShadow = true;
  facade.receiveShadow = true;
  group.add(facade);
  colliders.push({ 
    minX: x - width/2, maxX: x + width/2, 
    minZ: z - depth/2, maxZ: z + depth/2 
  });
  
  // Windows
  const winW = 1.1, winH = 1.6;
  const winCount = Math.max(2, Math.floor((width - 1.5) / 2));
  const winSpacing = (width - 1) / winCount;
  
  for (let f = 0; f < floors; f++) {
    for (let w = 0; w < winCount; w++) {
      const wx = -width / 2 + 0.8 + w * winSpacing;
      const wy = f * floorH + floorH * 0.55 + 0.3;
      
      // Window recess
      const recessGeo = new THREE.BoxGeometry(winW + 0.1, winH + 0.1, 0.15);
      const recess = new THREE.Mesh(recessGeo, MAT.concrete);
      recess.position.set(wx, wy, side > 0 ? -depth/2 - 0.07 : depth/2 + 0.07);
      group.add(recess);
      
      // Glass
      const glassGeo = new THREE.PlaneGeometry(winW, winH);
      const isLit = Math.random() > 0.4;
      const glass = new THREE.Mesh(glassGeo, isLit ? MAT.glassLit : MAT.glass);
      glass.position.set(wx, wy, side > 0 ? -depth/2 - 0.02 : depth/2 + 0.02);
      if (side < 0) glass.rotation.y = Math.PI;
      group.add(glass);
      
      // Window frame
      const frameColor = Math.random() > 0.5 ? '#e8e0d0' : '#c8c0b0';
      const frameMat = new THREE.MeshStandardMaterial({ color: frameColor, roughness: 0.7 });
      
      // Cross bars
      const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.04, winH, 0.04), frameMat);
      vBar.position.set(wx, wy, side > 0 ? -depth/2 - 0.03 : depth/2 + 0.03);
      group.add(vBar);
      
      const hBar = new THREE.Mesh(new THREE.BoxGeometry(winW, 0.04, 0.04), frameMat);
      hBar.position.set(wx, wy + 0.1, side > 0 ? -depth/2 - 0.03 : depth/2 + 0.03);
      group.add(hBar);
      
      // Sill
      if (f > 0) {
        const sill = new THREE.Mesh(
          new THREE.BoxGeometry(winW + 0.3, 0.08, 0.2), MAT.concrete
        );
        sill.position.set(wx, wy - winH/2 - 0.04, side > 0 ? -depth/2 - 0.1 : depth/2 + 0.1);
        sill.castShadow = true;
        group.add(sill);
      }
      
      // If lit window, add point light (sparse)
      if (isLit && Math.random() > 0.7) {
        const wLight = new THREE.PointLight('#c4a060', 0.3, 6);
        wLight.position.set(wx, wy, side > 0 ? -depth/2 - 0.5 : depth/2 + 0.5);
        group.add(wLight);
      }
    }
  }
  
  // Ground floor door
  const doorX = (Math.random() - 0.5) * (width - 3);
  const doorGeo = new THREE.BoxGeometry(1.3, 2.6, 0.15);
  const doorMat = new THREE.MeshStandardMaterial({ color: '#2a2015', roughness: 0.6 });
  const door = new THREE.Mesh(doorGeo, doorMat);
  door.position.set(doorX, 1.3, side > 0 ? -depth/2 - 0.07 : depth/2 + 0.07);
  group.add(door);
  
  // Door arch
  const archGeo = new THREE.BoxGeometry(1.6, 0.3, 0.2);
  const arch = new THREE.Mesh(archGeo, MAT.concrete);
  arch.position.set(doorX, 2.7, side > 0 ? -depth/2 - 0.1 : depth/2 + 0.1);
  group.add(arch);
  
  // Balcony (random floors)
  for (let f = 1; f < floors; f++) {
    if (Math.random() > 0.6) {
      const balcW = 1.8 + Math.random() * 1.5;
      const balcX = -width/2 + 1 + Math.random() * (width - 2);
      const balcY = f * floorH + 0.3;
      
      // Floor plate
      const bFloor = new THREE.Mesh(
        new THREE.BoxGeometry(balcW, 0.1, 0.7), MAT.concrete
      );
      bFloor.position.set(balcX, balcY, side > 0 ? -depth/2 - 0.35 : depth/2 + 0.35);
      bFloor.castShadow = true;
      group.add(bFloor);
      
      // Railing
      const railMat = new THREE.MeshStandardMaterial({ color: '#3a3530', roughness: 0.5, metalness: 0.8 });
      const railing = new THREE.Mesh(
        new THREE.BoxGeometry(balcW, 0.04, 0.04), railMat
      );
      railing.position.set(balcX, balcY + 0.9, side > 0 ? -depth/2 - 0.68 : depth/2 + 0.68);
      group.add(railing);
      
      // Railing verticals
      for (let rv = 0; rv < 5; rv++) {
        const vert = new THREE.Mesh(
          new THREE.BoxGeometry(0.02, 0.9, 0.02), railMat
        );
        vert.position.set(
          balcX - balcW/2 + 0.2 + rv * (balcW - 0.4) / 4,
          balcY + 0.45,
          side > 0 ? -depth/2 - 0.68 : depth/2 + 0.68
        );
        group.add(vert);
      }
    }
  }
  
  // Roof cornice
  const corniceGeo = new THREE.BoxGeometry(width + 0.4, 0.3, depth + 0.1);
  const cornice = new THREE.Mesh(corniceGeo, MAT.concrete);
  cornice.position.set(0, totalH - 0.5, 0);
  cornice.castShadow = true;
  group.add(cornice);
  
  // Parapet
  const parapetGeo = new THREE.BoxGeometry(width + 0.1, 0.8, 0.2);
  const parapet = new THREE.Mesh(parapetGeo, facadeMat);
  parapet.position.set(0, totalH + 0.1, side > 0 ? -depth/2 - 0.1 : depth/2 + 0.1);
  group.add(parapet);
  
  // Graffiti overlay (ground level)
  if (Math.random() > 0.3) {
    const grafTex = TEX.graffiti();
    const grafMat = new THREE.MeshBasicMaterial({ 
      map: grafTex, transparent: true, depthWrite: false, opacity: 0.8
    });
    const grafW = 2 + Math.random() * 3;
    const grafH = 1.5 + Math.random() * 2;
    const grafGeo = new THREE.PlaneGeometry(grafW, grafH);
    const graf = new THREE.Mesh(grafGeo, grafMat);
    graf.position.set(
      (Math.random() - 0.5) * (width - grafW),
      grafH / 2 + 0.2,
      side > 0 ? -depth/2 - 0.02 : depth/2 + 0.02
    );
    if (side < 0) graf.rotation.y = Math.PI;
    group.add(graf);
  }
  
  // Drain pipes
  if (Math.random() > 0.4) {
    const pipeX = (Math.random() > 0.5 ? -1 : 1) * (width/2 - 0.2);
    const pipeGeo = new THREE.CylinderGeometry(0.05, 0.05, totalH - 0.5, 6);
    const pipe = new THREE.Mesh(pipeGeo, MAT.metal);
    pipe.position.set(pipeX, totalH/2 - 0.25, side > 0 ? -depth/2 - 0.08 : depth/2 + 0.08);
    pipe.castShadow = true;
    group.add(pipe);
  }
  
  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

  const hair = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.1, 0.24), hairMat);
  hair.position.y = 1.75;

  // Arms
  [-0.28, 0.28].forEach(ax => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.14), bodyMat);
    arm.position.set(ax, 1.1, 0);

  [-0.1, 0.1].forEach(sx => {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.08, 0.24), shoeMat);
    shoe.position.set(sx, 0.24, 0.03);
    group.add(shoe);
  });
  
  group.position.set(x, 0, z);
  scene.add(group);
  
  const npc = {
    group,
    config,
    x, z,
    walkDir: config.walkDir || 0,
    walkSpeed: config.walkSpeed || 0,
    walkRange: config.walkRange || 0,
    startZ: z,

      npc,
      dialogIndex: 0

  }
  
  npcs.push(npc);
  return npc;
}

function createUBahn(x, z, side) {
  const group = new THREE.Group();
  
  // Entrance structure
  const wallMat = new THREE.MeshStandardMaterial({ color: '#3a4550', roughness: 0.7, metalness: 0.3 });
  
  // Side walls
  [-1.2, 1.2].forEach(sx => {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.5, 3), wallMat);
    wall.position.set(sx, 1.25, 0);
    wall.castShadow = true;
    group.add(wall);
  });
  
  // Top beam
  const beam = new THREE.Mesh(new THREE.BoxGeometry(2.55, 0.2, 3), wallMat);
  beam.position.y = 2.6;
  beam.castShadow = true;
  group.add(beam);
  
  // U sign
  const uSignGeo = new THREE.PlaneGeometry(0.8, 0.8);
  const uCanvas = document.createElement('canvas');
  uCanvas.width = 128; uCanvas.height = 128;
  const ux = uCanvas.getContext('2d');
  ux.fillStyle = '#1a3080';
  ux.fillRect(0, 0, 128, 128);
  ux.fillStyle = '#ffffff';
  ux.font = 'bold 80px Arial';
  ux.textAlign = 'center';
  ux.textBaseline = 'middle';
  ux.fillText('U', 64, 64);
  const uTex = new THREE.CanvasTexture(uCanvas);
  const uSign = new THREE.Mesh(uSignGeo, new THREE.MeshStandardMaterial({ 
    map: uTex, emissive: '#1a3080', emissiveIntensity: 0.3 
  }));
  uSign.position.set(0, 3.1, side > 0 ? -1.51 : 1.51);
  if (side < 0) uSign.rotation.y = Math.PI;
  group.add(uSign);
  
  // Steps going down
  for (let s = 0; s < 5; s++) {
    const step = new THREE.Mesh(
      new THREE.BoxGeometry(2.2, 0.15, 0.4), MAT.concrete
    );
    step.position.set(0, -s * 0.2, side > 0 ? 0.8 + s * 0.4 : -0.8 - s * 0.4);
    step.receiveShadow = true;
    group.add(step);
  }
  
  group.position.set(x, 0, z);
  scene.add(group);
  
  colliders.push({ minX: x - 1.3, maxX: x + 1.3, minZ: z - 2, maxZ: z + 2 });
  interactables.push({
    type: 'ubahn', x, z: z + (side > 0 ? -1.5 : 1.5), radius: 3,
    action: 'ubahn',
    prompt: '[E] U-Bahn (Schnellreise)',
  });
}

// ============================================================
// PLAYER CONTROLLER
// ============================================================
const keys = {};
let mouseX = 0, mouseY = 0;
let playerYaw = 0, playerPitch = 0;
let isPointerLocked = false;
const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') tryInteract();
  if (e.code === 'ShiftLeft') STATE.running = true;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ShiftLeft') STATE.running = false;
});

renderer.domElement.addEventListener('click', () => {
  if (!STATE.gameStarted) return;
  if (!isPointerLocked && !isMobile) {
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = !!document.pointerLockElement;
});

document.addEventListener('mousemove', e => {
  if (!isPointerLocked || STATE.inDialog) return;
  playerYaw -= e.movementX * 0.002;
  playerPitch -= e.movementY * 0.002;
  playerPitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, playerPitch));
});

// Touch controls
let joystickActive = false, joystickDX = 0, joystickDZ = 0;
let touchLookId = null, lastTouchX = 0, lastTouchY = 0;

if (isMobile) {
  const joystickArea = document.getElementById('joystick-area');
  const knob = document.getElementById('joystick-knob');
  
  joystickArea.addEventListener('touchstart', e => {
    joystickActive = true;
    e.preventDefault();
  });
  
  joystickArea.addEventListener('touchmove', e => {
    if (!joystickActive) return;
    e.preventDefault();
    const rect = joystickArea.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const touch = e.touches[0];
    let dx = (touch.clientX - cx) / (rect.width / 2);
    let dy = (touch.clientY - cy) / (rect.height / 2);
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > 1) { dx /= len; dy /= len; }
    knob.style.transform = `translate(${-50 + dx * 40}%, ${-50 + dy * 40}%)`;
    joystickDX = dx;
    joystickDZ = dy;
  });
  
  joystickArea.addEventListener('touchend', () => {
    joystickActive = false;
    joystickDX = joystickDZ = 0;
    knob.style.transform = 'translate(-50%, -50%)';
  });
  
  // Look via right side touch
  renderer.domElement.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      if (t.clientX > window.innerWidth / 2) {
        touchLookId = t.identifier;
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
      }
    }
  });
  
  renderer.domElement.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchLookId) {
        const dx = t.clientX - lastTouchX;
        const dy = t.clientY - lastTouchY;
        playerYaw -= dx * 0.004;
        playerPitch -= dy * 0.004;
        playerPitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, playerPitch));
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
      }
    }
  });
  
  renderer.domElement.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchLookId) touchLookId = null;
    }
  });
  
  document.getElementById('action-btn').addEventListener('touchstart', e => {
    e.preventDefault();
    tryInteract();
  });
}

// ============================================================
// COLLISION
// ============================================================
function checkCollision(x, z, radius = 0.3) {
  for (const c of colliders) {
    if (x + radius > c.minX && x - radius < c.maxX &&
        z + radius > c.minZ && z - radius < c.maxZ) {
      return true;
    }
  }
  return false;
}

// ============================================================
// UI UPDATES
// ============================================================
function updateHUD() {
  const bars = [
    ['health', STATE.health, '#8b3a3a'],
    ['hunger', STATE.hunger, '#8b6914'],
    ['warmth', STATE.warmth, '#c4a35a'],
    ['energy', STATE.energy, '#4a7a8b']
  ];
  
  bars.forEach(([id, val, color]) => {
    const bar = document.getElementById(`${id}-bar`);
    const valEl = document.getElementById(`${id}-val`);
    if (bar && valEl) {
      bar.style.width = `${Math.max(0, val)}%`;
      valEl.textContent = Math.round(val);
      if (val < 25) bar.style.background = '#a03030';
      else bar.style.background = color;
    }
  });
  
  document.getElementById('money-val').textContent = STATE.money.toFixed(2);
  
  const h = Math.floor(STATE.hour);
  const m = Math.floor(STATE.minute);
  document.getElementById('time-val').textContent = 
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  document.getElementById('day-val').textContent = `Tag ${STATE.day}`;
}

function showNotification(text, duration = 3000) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.style.display = 'block';
  el.style.opacity = '1';
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.style.display = 'none', 500);
  }, duration);
}

// ============================================================
// DIALOG SYSTEM
// ============================================================
function showDialog(dialogData) {
  STATE.inDialog = true;
  const box = document.getElementById('dialog-box');
  const speaker = document.getElementById('dialog-speaker');
  const text = document.getElementById('dialog-text');
  const choices = document.getElementById('dialog-choices');
  
  speaker.textContent = dialogData.speaker;
  text.textContent = dialogData.text;
  choices.innerHTML = '';
  
  dialogData.choices.forEach(choice => {
    const btn = document.createElement('div');
    btn.className = 'dialog-choice';
    btn.textContent = choice.text;
    btn.addEventListener('click', () => handleChoice(choice));
    choices.appendChild(btn);
  });
  
  box.style.display = 'block';
  if (isPointerLocked) document.exitPointerLock();
}

function closeDialog() {
  STATE.inDialog = false;
  document.getElementById('dialog-box').style.display = 'none';
}

function handleChoice(choice) {
  switch (choice.action) {
    case 'close':
      if (choice.info) {
        STATE.shelterKnown = true;
        showNotification('Neuer Ort: Schlafplatz hinterm Lidl');
      }
      closeDialog();
      break;
      
    case 'buy_food':
      if (STATE.money >= choice.cost) {
        STATE.money -= choice.cost;
        STATE.hunger = Math.min(100, STATE.hunger + choice.hunger);
        showNotification(`Brötchen gekauft — Hunger +${choice.hunger}`);
      } else {
        showNotification('Nicht genug Geld...');
      }
      closeDialog();
      break;
      
    case 'buy_beer':
      if (STATE.money >= choice.cost) {
        STATE.money -= choice.cost;
        STATE.warmth = Math.min(100, STATE.warmth + 15);
        STATE.energy = Math.max(0, STATE.energy - 10);
        showNotification('Bier gekauft — Wärme +15, Energie -10');
      } else {
        showNotification('Nicht genug Geld...');
      }
      closeDialog();
      break;
      
    case 'sell_bottles':
      if (STATE.bottles > 0) {
        const earning = STATE.bottles * 0.25;
        STATE.money += earning;
        showNotification(`${STATE.bottles} Flaschen abgegeben — €${earning.toFixed(2)}`);
        STATE.bottles = 0;
      } else {
        showNotification('Keine Flaschen zum Abgeben.');
      }
      closeDialog();
      break;
      
    case 'beg_food':
      if (Math.random() > 0.5) {
        STATE.hunger = Math.min(100, STATE.hunger + 15);
        showNotification('Du bekommst ein halbes Brötchen. Hunger +15');
      } else {
        showNotification('"Hab selbst nix, Alter."');
      }
      closeDialog();
      break;
      
    case 'shelter_info':
      STATE.shelterKnown = true;
      showDialog({
        speaker: 'SOZIALARBEITERIN',
        text: 'Wir sind in der Gitschiner Straße. Ab 20 Uhr offen. Warmes Essen und ein Bett. Kostenlos.',
        choices: [
          { text: 'Danke. Ich komme vielleicht.', action: 'close' }
        ]
      });
      showNotification('Neuer Ort: Notunterkunft Gitschiner Str.');
      break;
      
    case 'ubahn':
      showNotification('Schwarzfahren... Risiko!');
      closeDialog();
      break;
  }
  updateHUD();
}

// ============================================================
// INTERACTION
// ============================================================
let nearestInteractable = null;

function findNearestInteractable() {
  const px = camera.position.x;
  const pz = camera.position.z;
  let nearest = null;
  let minDist = Infinity;
  
  for (const ia of interactables) {
    if (ia.collected) continue;
    const dx = ia.x - px;
    const dz = ia.z - pz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < ia.radius && dist < minDist) {
      minDist = dist;
      nearest = ia;
    }
  }
  
  return nearest;
}

function tryInteract() {
  if (STATE.inDialog) return;
  if (!nearestInteractable) return;
  
  const ia = nearestInteractable;
  
  switch (ia.action) {
    case 'shop':
    case 'talk':
      const npc = ia.npc || interactables.find(i => i.type === 'npc' && i.x === ia.x);
      if (ia.type === 'spaeti') {
        // Find Späti vendor dialog
        const vendor = interactables.find(i => i.type === 'npc' && i.npc?.config.name === 'Mehmet');
        if (vendor) showDialog(vendor.npc.config.dialog[0]);
      } else if (npc?.config?.dialog) {
        showDialog(npc.config.dialog[npc.dialogIndex || 0]);
      }
      break;
      
    case 'collect':
      if (ia.mesh) {
        ia.collected = true;
        ia.mesh.visible = false;
        STATE.bottles++;
        showNotification(`Flasche gesammelt! (${STATE.bottles} gesamt — je €0.25)`);
      }
      break;
      
    case 'rest':
      if (STATE.energy < 100) {
        STATE.energy = Math.min(100, STATE.energy + 20);
        STATE.minute += 30;
        if (STATE.minute >= 60) { STATE.minute -= 60; STATE.hour++; }
        showNotification('Kurze Pause... Energie +20');
        updateHUD();
      } else {
        showNotification('Du bist nicht müde.');
      }
      break;
      
    case 'warm':
      STATE.warmth = Math.min(100, STATE.warmth + 25);
      STATE.minute += 15;
      if (STATE.minute >= 60) { STATE.minute -= 60; STATE.hour++; }
      showNotification('Am Feuer gewärmt... Wärme +25');
      updateHUD();
      break;
      
    case 'search':
      const r = Math.random();
      if (r > 0.7) {
        STATE.hunger = Math.min(100, STATE.hunger + 10);
        showNotification('Essensreste gefunden... Hunger +10');
      } else if (r > 0.4) {
        STATE.bottles++;
        showNotification(`Leere Flasche gefunden! (${STATE.bottles} gesamt)`);
      } else {
        showNotification('Nichts Brauchbares gefunden.');
      }
      STATE.health = Math.max(0, STATE.health - 2);
      updateHUD();
      break;
      
    case 'ubahn':
      showDialog({
        speaker: 'U-BAHN',
        text: 'Kein Ticket, kein Problem? Kontrollen sind selten... aber wenn sie kommen: €60 Strafe.',
        choices: [
          { text: 'Schwarzfahren (Risiko)', action: 'close' },
          { text: 'Lieber nicht.', action: 'close' }
        ]
      });
      break;
  }
}

// ============================================================
// GAME LOOP
// ============================================================
const clock = new THREE.Clock();
let elapsed = 0;

function updatePlayer(dt) {
  if (STATE.inDialog) return;
  
  const speed = (STATE.running ? STATE.speed * 1.6 : STATE.speed) * dt;
  
  let moveX = 0, moveZ = 0;
  
  if (isMobile) {
    moveX = joystickDX;
    moveZ = joystickDZ;
  } else {
    if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
    if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
    if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
    if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;
  }
  
  if (moveX !== 0 || moveZ !== 0) {
    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
    moveX /= len; moveZ /= len;
    
    const sin = Math.sin(playerYaw);
    const cos = Math.cos(playerYaw);
    
    const dx = (moveX * cos - moveZ * sin) * speed;
    const dz = (moveX * sin + moveZ * cos) * speed;
    
    const newX = camera.position.x + dx;
    const newZ = camera.position.z + dz;
    
    if (!checkCollision(newX, camera.position.z)) camera.position.x = newX;
    if (!checkCollision(camera.position.x, newZ)) camera.position.z = newZ;
    
    // Energy drain
    if (STATE.running) STATE.energy = Math.max(0, STATE.energy - dt * 2);
  }
  
  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = playerYaw;
  camera.rotation.x = playerPitch;
  
  // Clamp position
  camera.position.x = Math.max(-25, Math.min(25, camera.position.x));
  camera.position.z = Math.max(-BLOCK_LEN + 5, Math.min(12, camera.position.z));
}

function updateNPCs(dt) {
  npcs.forEach(npc => {
    if (npc.walkSpeed > 0) {
      npc.z += npc.walkDir * npc.walkSpeed * dt;
      npc.group.position.z = npc.z;
      
      // Walk animation (simple bob)
      npc.group.position.y = Math.abs(Math.sin(elapsed * npc.walkSpeed * 3)) * 0.03;
      
      if (Math.abs(npc.z - npc.startZ) > npc.walkRange) {
        npc.walkDir *= -1;
        npc.group.rotation.y = npc.walkDir > 0 ? 0 : Math.PI;
      }
      
      if (npc.interactable) {
        npc.interactable.z = npc.z;
        npc.interactable.x = npc.group.position.x;
      }
    }
  });
}

function updateTime(dt) {
  // 1 real second = 1 game minute
  STATE.minute += dt * 1;
  if (STATE.minute >= 60) {
    STATE.minute -= 60;
    STATE.hour++;
    
    // Hourly stat drain
    STATE.hunger = Math.max(0, STATE.hunger - 3);
    STATE.warmth = Math.max(0, STATE.warmth - 2);
    STATE.energy = Math.max(0, STATE.energy - 1.5);
    
    // Night is colder
    if (STATE.hour >= 22 || STATE.hour < 6) {
      STATE.warmth = Math.max(0, STATE.warmth - 3);
    }
    
    // Low stats = health damage
    if (STATE.hunger < 20) STATE.health = Math.max(0, STATE.health - 2);
    if (STATE.warmth < 15) STATE.health = Math.max(0, STATE.health - 3);
    if (STATE.energy < 10) STATE.health = Math.max(0, STATE.health - 1);
  }
  
  if (STATE.hour >= 24) {
    STATE.hour -= 24;
    STATE.day++;
    showNotification(`Tag ${STATE.day} — Noch eine Nacht überlebt.`);
  }
  
  // Update lighting based on time
  updateDayNightCycle();
}

function updateDayNightCycle() {
  const h = STATE.hour + STATE.minute / 60;
  let sunIntensity, ambientIntensity, fogDensity;
  let sunColor, ambientColor, bgColor;
  
  if (h >= 6 && h < 8) { // Dawn
    const t = (h - 6) / 2;
    sunIntensity = t * 0.6;
    ambientIntensity = 0.2 + t * 0.2;
    fogDensity = 0.018 - t * 0.006;
    sunColor = new THREE.Color('#d08040').lerp(new THREE.Color('#c49050'), t);
    bgColor = new THREE.Color('#1a1815').lerp(new THREE.Color('#3a3530'), t);
  } else if (h >= 8 && h < 16) { // Day
    sunIntensity = 0.6;
    ambientIntensity = 0.4;
    fogDensity = 0.012;
    sunColor = new THREE.Color('#c4a070');
    bgColor = new THREE.Color('#4a4540');
  } else if (h >= 16 && h < 19) { // Golden hour
    const t = (h - 16) / 3;
    sunIntensity = 0.6 + t * 0.2;
    ambientIntensity = 0.4 - t * 0.15;
    fogDensity = 0.012 + t * 0.004;
    sunColor = new THREE.Color('#c49050').lerp(new THREE.Color('#d06030'), t);
    bgColor = new THREE.Color('#4a4540').lerp(new THREE.Color('#2a2015'), t);
  } else if (h >= 19 && h < 21) { // Dusk
    const t = (h - 19) / 2;
    sunIntensity = 0.8 - t * 0.7;
    ambientIntensity = 0.25 - t * 0.1;
    fogDensity = 0.016 + t * 0.008;
    sunColor = new THREE.Color('#d06030').lerp(new THREE.Color('#3a2020'), t);
    bgColor = new THREE.Color('#2a2015').lerp(new THREE.Color('#0a0a0a'), t);
  } else { // Night
    sunIntensity = 0.05;
    ambientIntensity = 0.12;
    fogDensity = 0.025;
    sunColor = new THREE.Color('#1a2030');
    bgColor = new THREE.Color('#0a0a0a');
  }
  
  sunLight.intensity = sunIntensity;
  sunLight.color.copy(sunColor);
  ambientLight.intensity = ambientIntensity;
  scene.background.copy(bgColor);
  scene.fog.density = fogDensity;
}

function updateFireEffects(dt) {
  scene.traverse(obj => {
    if (obj.userData?.isFlame) {
      obj.position.y = obj.userData.baseY + Math.sin(elapsed * 5 + obj.id) * 0.05;
      obj.rotation.y += dt * 2;
      obj.material.opacity = 0.4 + Math.sin(elapsed * 3 + obj.id * 0.5) * 0.2;
    }
  });
}

function updateInteractPrompt() {
  nearestInteractable = findNearestInteractable();
  const prompt = document.getElementById('interact-prompt');
  if (nearestInteractable && !STATE.inDialog) {
    prompt.textContent = nearestInteractable.prompt;
    prompt.style.display = 'block';
  } else {
    prompt.style.display = 'none';
  }
}

// Minimap
const minimapCtx = document.getElementById('minimap-canvas').getContext('2d');
function updateMinimap() {
  const mc = minimapCtx;
  mc.fillStyle = '#1a1a18';
  mc.fillRect(0, 0, 120, 120);
  
  // Street
  mc.fillStyle = '#2a2826';
  mc.fillRect(50, 0, 20, 120);
  
  // Buildings
  mc.fillStyle = '#4a4540';
  colliders.forEach(c => {
    const x = 60 + (c.minX + c.maxX) / 2 * 1.2;
    const y = 60 - (c.minZ + c.maxZ) / 2 * 1.0;
    const w = (c.maxX - c.minX) * 1.2;
    const h = (c.maxZ - c.minZ) * 1.0;
    if (w > 2 && h > 2) {
      mc.fillRect(x - w/2, y - h/2, w, h);
    }
  });
  
  // Player
  const px = 60 + camera.position.x * 1.2;
  const py = 60 - camera.position.z * 1.0;
  mc.fillStyle = '#c4a35a';
  mc.beginPath();
  mc.arc(px, py, 3, 0, Math.PI * 2);
  mc.fill();
  
  // Direction indicator
  mc.strokeStyle = '#c4a35a';
  mc.lineWidth = 1.5;
  mc.beginPath();
  mc.moveTo(px, py);
  mc.lineTo(px - Math.sin(playerYaw) * 8, py - Math.cos(playerYaw) * 8);
  mc.stroke();
}

// ============================================================
// GAME LIFECYCLE
// ============================================================
let loadProgress = 0;
const loadInterval = setInterval(() => {
  loadProgress += 5 + Math.random() * 10;
  if (loadProgress > 100) loadProgress = 100;
  document.getElementById('load-fill').style.width = `${loadProgress}%`;
  
  const texts = ['Lade Texturen...', 'Baue Gebäude...', 'Pflastere Straßen...', 
                  'Sprayen Graffiti...', 'Platziere NPCs...', 'Erzeuge Atmosphäre...'];
  document.getElementById('load-text').textContent = texts[Math.floor(Math.random() * texts.length)];
  
  if (loadProgress >= 100) {
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('title-screen').style.display = 'flex';
    }, 500);
  }
}, 200);

window.startGame = function() {
  STATE.gameStarted = true;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('money-display').style.display = 'block';
  document.getElementById('time-display').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  
  if (isMobile) {
    document.getElementById('touch-controls').style.display = 'block';
  }
  
  camera.position.set(0, 1.7, 5);
  showNotification('Berlin-Kreuzberg. Überlebt die Nacht.', 4000);
};

// Main loop
function animate() {
  requestAnimationFrame(animate);
  
  if (!STATE.gameStarted) {
    renderer.render(scene, camera);
    return;
  }
  
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;
  
  updatePlayer(dt);
  updateNPCs(dt);
  updateTime(dt);
  updateFireEffects(dt);
  updateInteractPrompt();
  updateHUD();
  
  if (Math.floor(elapsed * 2) % 2 === 0) updateMinimap();
  
  // Game over check
  if (STATE.health <= 0) {
    showNotification('Du hast die Straße nicht überlebt...', 5000);
    STATE.health = 50;
    STATE.hunger = 40;
    STATE.warmth = 40;
    STATE.energy = 30;
    STATE.day++;
    camera.position.set(0, 1.7, 5);
  }
  
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
