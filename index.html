<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIEZKINGS - Berlin Street Survival</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            overflow: hidden;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #FF6B35;
            border-radius: 15px;
            padding: 15px;
            color: white;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .stat-value {
            color: #FF6B35;
            font-weight: bold;
        }
        
        #game-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 200;
            pointer-events: auto;
        }
        
        #game-title h1 {
            font-size: 3rem;
            color: #FF6B35;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.8);
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        #game-title p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 30px;
        }
        
        #start-btn {
            background: linear-gradient(45deg, #FF6B35, #FF8C42);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }
        
        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.6);
        }
        
        #action-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            pointer-events: auto;
        }
        
        .action-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #FF6B35;
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            min-width: 120px;
            text-align: center;
        }
        
        .action-btn:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: scale(1.05);
        }
        
        #notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #FF6B35;
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
            display: none;
            backdrop-filter: blur(10px);
            z-index: 300;
        }
        
        .canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <!-- Stats Panel -->
        <div id="stats-panel" style="display: none;">
            <div class="stat">
                <span>Gesundheit:</span>
                <span class="stat-value" id="health">100</span>
            </div>
            <div class="stat">
                <span>Hunger:</span>
                <span class="stat-value" id="hunger">50</span>
            </div>
            <div class="stat">
                <span>Geld:</span>
                <span class="stat-value" id="money">2.50€</span>
            </div>
            <div class="stat">
                <span>Respekt:</span>
                <span class="stat-value" id="respect">10</span>
            </div>
        </div>
        
        <!-- Game Title Screen -->
        <div id="game-title">
            <h1>KIEZKINGS</h1>
            <p>Überlebe auf Berlins Straßen</p>
            <button id="start-btn" onclick="startGame()">SPIEL STARTEN</button>
        </div>
        
        <!-- Action Buttons -->
        <div id="action-panel">
            <button class="action-btn" onclick="doAction('search')">🗑️ Mülltonne</button>
            <button class="action-btn" onclick="doAction('beg')">🤲 Betteln</button>
            <button class="action-btn" onclick="doAction('bottles')">🍾 Pfand</button>
        </div>
        
        <!-- Notification -->
        <div id="notification">
            <p id="notification-text"></p>
        </div>
    </div>
    
    <canvas id="gameCanvas" class="canvas-container"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            health: 100,
            hunger: 50,
            money: 2.50,
            respect: 10,
            playing: false
        };

        // 3D Scene Variables
        let scene, camera, renderer;
        let character, buildings = [], streetItems = [];
        
        // Initialize 3D Scene
        function init3D() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 100);

            // Camera
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);
            camera.lookAt(0, 0, 0);

            // Renderer
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            createWorld();
            createLighting();
            createCharacter();
            
            animate();
        }

        function createWorld() {
            // Ground
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Simple Buildings
            const colors = [0x2d2d2d, 0x3d3d3d, 0x4d4d4d];
            for (let i = 0; i < 8; i++) {
                const buildingGeometry = new THREE.BoxGeometry(
                    3 + Math.random() * 2,
                    5 + Math.random() * 8,
                    3 + Math.random() * 2
                );
                const buildingMaterial = new THREE.MeshLambertMaterial({ 
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                
                const angle = (i / 8) * Math.PI * 2;
                building.position.x = Math.cos(angle) * (15 + Math.random() * 5);
                building.position.z = Math.sin(angle) * (15 + Math.random() * 5);
                building.position.y = building.geometry.parameters.height / 2;
                building.castShadow = true;
                
                buildings.push(building);
                scene.add(building);
            }

            // Street Items
            createStreetItems();
        }

        function createStreetItems() {
            // Trash bins
            for (let i = 0; i < 6; i++) {
                const trashGeometry = new THREE.CylinderGeometry(0.6, 0.8, 1.5, 8);
                const trashMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
                const trash = new THREE.Mesh(trashGeometry, trashMaterial);
                
                trash.position.x = (Math.random() - 0.5) * 20;
                trash.position.z = (Math.random() - 0.5) * 20;
                trash.position.y = 0.75;
                trash.castShadow = true;
                trash.userData = { type: 'trash', interactable: true };
                
                // Glowing ring
                const ringGeometry = new THREE.RingGeometry(1, 1.2, 16);
                const ringMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xff6b35, 
                    transparent: true, 
                    opacity: 0.6 
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 0.1;
                trash.add(ring);
                
                streetItems.push(trash);
                scene.add(trash);
            }

            // Bottles scattered around
            for (let i = 0; i < 8; i++) {
                const bottleGeometry = new THREE.CylinderGeometry(0.1, 0.15, 0.5, 8);
                const bottleMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x4a7c59,
                    transparent: true,
                    opacity: 0.8
                });
                const bottle = new THREE.Mesh(bottleGeometry, bottleMaterial);
                
                bottle.position.x = (Math.random() - 0.5) * 25;
                bottle.position.z = (Math.random() - 0.5) * 25;
                bottle.position.y = 0.25;
                bottle.rotation.z = Math.random() * Math.PI;
                bottle.userData = { type: 'bottle', interactable: true };
                
                streetItems.push(bottle);
                scene.add(bottle);
            }
        }

        function createCharacter() {
            const characterGroup = new THREE.Group();
            
            // Body
            const bodyGeometry = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 8);
            const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1.2;
            characterGroup.add(body);
            
            // Head
            const headGeometry = new THREE.SphereGeometry(0.3, 8, 6);
            const headMaterial = new THREE.MeshLambertMaterial({ color: 0xfdbcb4 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 2;
            characterGroup.add(head);
            
            // Hat
            const hatGeometry = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 8);
            const hatMaterial = new THREE.MeshLambertMaterial({ color: 0x2d2d2d });
            const hat = new THREE.Mesh(hatGeometry, hatMaterial);
            hat.position.y = 2.2;
            characterGroup.add(hat);
            
            characterGroup.position.set(0, 0, 0);
            characterGroup.castShadow = true;
            character = characterGroup;
            scene.add(character);
        }

        function createLighting() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);

            // Main directional light
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Orange accent lights
            const orangeLight1 = new THREE.PointLight(0xff6b35, 0.5, 20);
            orangeLight1.position.set(-10, 3, -10);
            scene.add(orangeLight1);

            const orangeLight2 = new THREE.PointLight(0xff6b35, 0.5, 20);
            orangeLight2.position.set(10, 3, 10);
            scene.add(orangeLight2);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate camera around scene
            if (!gameState.playing) {
                const time = Date.now() * 0.0005;
                camera.position.x = Math.cos(time) * 20;
                camera.position.z = Math.sin(time) * 20;
                camera.lookAt(0, 0, 0);
            }
            
            // Animate glowing rings
            streetItems.forEach((item, index) => {
                if (item.children[0]) {
                    const ring = item.children[0];
                    const time = Date.now() * 0.003 + index;
                    ring.material.opacity = 0.3 + Math.sin(time) * 0.3;
                }
            });
            
            renderer.render(scene, camera);
        }

        function startGame() {
            gameState.playing = true;
            document.getElementById('game-title').style.display = 'none';
            document.getElementById('stats-panel').style.display = 'block';
            document.getElementById('action-panel').style.display = 'flex';
            
            // Stop camera rotation
            camera.position.set(15, 12, 15);
            camera.lookAt(0, 0, 0);
        }

        function doAction(action) {
            let message = '';
            let type = 'info';
            
            if (gameState.hunger <= 0) {
                showNotification('Du bist zu schwach! Such Essen!', 'danger');
                return;
            }
            
            switch(action) {
                case 'search':
                    gameState.hunger -= 5;
                    if (Math.random() < 0.6) {
                        const found = Math.floor(Math.random() * 3) + 1;
                        gameState.money += found * 0.25;
                        message = `Du findest ${found} Pfandflaschen! (+${(found * 0.25).toFixed(2)}€)`;
                        type = 'success';
                    } else {
                        gameState.health -= 10;
                        message = 'Autsch! Du schneidest dich an einer Scherbe!';
                        type = 'danger';
                    }
                    break;
                    
                case 'beg':
                    gameState.hunger -= 3;
                    const earned = Math.floor(Math.random() * 5) + 1;
                    gameState.money += earned;
                    gameState.respect += 1;
                    message = `Ein Passant gibt dir ${earned}€!`;
                    type = 'success';
                    break;
                    
                case 'bottles':
                    gameState.hunger -= 2;
                    const bottles = Math.floor(Math.random() * 4) + 2;
                    gameState.money += bottles * 0.25;
                    message = `Du sammelst ${bottles} Flaschen! (+${(bottles * 0.25).toFixed(2)}€)`;
                    type = 'success';
                    break;
            }
            
            updateStats();
            showNotification(message, type);
            
            // Check game over
            if (gameState.health <= 0) {
                setTimeout(() => {
                    showNotification('GAME OVER! Du bist gestorben!', 'danger');
                    setTimeout(() => location.reload(), 2000);
                }, 1000);
            }
            
            // Stat decay
            setTimeout(() => {
                gameState.hunger = Math.max(0, gameState.hunger - 2);
                updateStats();
            }, 3000);
        }

        function updateStats() {
            document.getElementById('health').textContent = gameState.health;
            document.getElementById('hunger').textContent = gameState.hunger;
            document.getElementById('money').textContent = gameState.money.toFixed(2) + '€';
            document.getElementById('respect').textContent = gameState.respect;
        }

        function showNotification(text, type = 'info') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = text;
            notification.style.display = 'block';
            
            if (type === 'success') {
                notification.style.borderColor = '#4CAF50';
            } else if (type === 'danger') {
                notification.style.borderColor = '#f44336';
            } else {
                notification.style.borderColor = '#FF6B35';
            }
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Touch/Mouse Controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        function setupControls() {
            const canvas = document.getElementById('gameCanvas');
            
            // Touch controls
            canvas.addEventListener('touchstart', (e) => {
                if (!gameState.playing) return;
                isDragging = true;
                const touch = e.touches[0];
                previousMousePosition.x = touch.clientX;
                previousMousePosition.y = touch.clientY;
                e.preventDefault();
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!gameState.playing || !isDragging) return;
                
                const touch = e.touches[0];
                const deltaX = touch.clientX - previousMousePosition.x;
                const deltaY = touch.clientY - previousMousePosition.y;

                // Rotate camera around character
                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                spherical.theta -= deltaX * 0.01;
                spherical.phi += deltaY * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));

                camera.position.setFromSpherical(spherical);
                camera.lookAt(character.position);

                previousMousePosition.x = touch.clientX;
                previousMousePosition.y = touch.clientY;
                e.preventDefault();
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
            });

            // Mouse controls for desktop
            canvas.addEventListener('mousedown', (e) => {
                if (!gameState.playing) return;
                isDragging = true;
                previousMousePosition.x = e.clientX;
                previousMousePosition.y = e.clientY;
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!gameState.playing || !isDragging) return;
                
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                spherical.theta -= deltaX * 0.01;
                spherical.phi += deltaY * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));

                camera.position.setFromSpherical(spherical);
                camera.lookAt(character.position);

                previousMousePosition.x = e.clientX;
                previousMousePosition.y = e.clientY;
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize everything
        window.addEventListener('load', () => {
            init3D();
            setupControls();
            updateStats();
        });
    </script>
</body>
</html>
